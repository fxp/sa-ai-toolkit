<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypothesis — Live Annotation Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .card { background: rgba(30,30,50,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(100,100,150,0.2); border-radius: 12px; }
  .gradient-text { background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #lang-toggle { cursor: pointer; } #lang-toggle:hover { background: rgba(100,150,255,0.2); }
  textarea, select { background: #0b1220; color: #e2e8f0; border: 1px solid rgba(100,100,150,0.3); border-radius: 8px; padding: 10px; }
  textarea:focus, select:focus { outline: none; border-color: #60a5fa; }
  .btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; padding: 8px 16px; border-radius: 8px; font-weight: 500; }
  .btn:disabled { opacity: 0.5; }
  .btn-sec { background: rgba(100,100,150,0.2); border: 1px solid rgba(100,100,150,0.3); padding: 8px 16px; border-radius: 8px; color: #e2e8f0; }
  .hl-data { background: rgba(239,68,68,0.18); border-bottom: 2px solid #ef4444; padding: 1px 3px; border-radius: 3px; cursor: pointer; }
  .hl-contra { background: rgba(234,179,8,0.18); border-bottom: 2px solid #eab308; padding: 1px 3px; border-radius: 3px; cursor: pointer; }
  .hl-strat { background: rgba(34,197,94,0.18); border-bottom: 2px solid #22c55e; padding: 1px 3px; border-radius: 3px; cursor: pointer; }
  .hl-crit { background: rgba(59,130,246,0.18); border-bottom: 2px solid #3b82f6; padding: 1px 3px; border-radius: 3px; cursor: pointer; }
  .annotation { font-size: 12px; padding: 8px 10px; border-radius: 8px; margin-top: 6px; display: block; }
  .ann-data { background: rgba(239,68,68,0.12); border-left: 3px solid #ef4444; }
  .ann-contra { background: rgba(234,179,8,0.12); border-left: 3px solid #eab308; }
  .ann-strat { background: rgba(34,197,94,0.12); border-left: 3px solid #22c55e; }
  .ann-crit { background: rgba(59,130,246,0.12); border-left: 3px solid #3b82f6; }
  .pulse { display: inline-block; width: 10px; height: 10px; background: #60a5fa; border-radius: 50%; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.4); } }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #22c55e; color: #fff; padding: 10px 20px; border-radius: 8px; z-index: 100; animation: slide 3s ease; }
  @keyframes slide { 0%,100% { opacity: 0; } 10%,90% { opacity: 1; } }
  pre { background: #0b1220; border-radius: 8px; padding: 12px; font-size: 11px; color: #94a3b8; overflow-x: auto; }
</style>
</head>
<body class="min-h-screen">

<div class="fixed top-4 right-4 z-50">
  <button id="lang-toggle" class="px-3 py-1.5 rounded-full bg-gray-800/80 backdrop-blur border border-gray-700 text-sm font-medium text-gray-300 flex items-center gap-2">
    <span>🌐</span><span id="lang-label">中文</span>
  </button>
</div>

<div class="max-w-7xl mx-auto px-6 py-8">
  <a href="/" class="text-sm text-blue-400 hover:text-blue-300" data-en="← Back to home" data-zh="← 返回首页">← Back to home</a>
  <h1 class="text-3xl font-bold mt-3 gradient-text" data-en="Hypothesis Annotator" data-zh="Hypothesis 标注生成器">Hypothesis Annotator</h1>
  <p class="text-gray-400 mt-1" data-en="Paste an article → auto-highlight key data, contrarian views, strategy, and AI critique." data-zh="粘贴文章 → 自动高亮关键数据、非共识观点、策略、AI 批评。">Paste an article → auto-highlight key data, contrarian views, strategy, and AI critique.</p>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mt-6">
    <div class="card p-5">
      <div class="flex items-center gap-2 mb-3">
        <select id="preset" class="text-sm">
          <option value="0">AI market 2026</option>
          <option value="1">Enterprise AI trends</option>
          <option value="2">LLM economics</option>
          <option value="3">Multi-agent systems</option>
          <option value="4">AI safety debate</option>
        </select>
        <button id="analyze" class="btn" data-en="Analyze" data-zh="分析">Analyze</button>
        <button id="post" class="btn-sec" data-en="Post to Hypothes.is" data-zh="发布到 Hypothes.is">Post to Hypothes.is</button>
        <span id="status" class="text-sm text-gray-400"></span>
      </div>
      <textarea id="input" rows="20" class="w-full text-sm"></textarea>
    </div>
    <div class="card p-5">
      <h2 class="font-semibold text-purple-300 mb-2" data-en="Annotated" data-zh="已标注">Annotated</h2>
      <div class="flex gap-3 text-xs text-gray-400 mb-3 flex-wrap">
        <span>🔴 <span data-en="Key Data" data-zh="关键数据">Key Data</span></span>
        <span>🟡 <span data-en="Contrarian" data-zh="非共识观点">Contrarian</span></span>
        <span>🟢 <span data-en="Strategy" data-zh="产品策略">Strategy</span></span>
        <span>💬 <span data-en="AI Critique" data-zh="AI 批评">AI Critique</span></span>
      </div>
      <div id="annotated" class="text-sm leading-relaxed text-gray-300"></div>
      <h3 class="font-semibold text-blue-300 mt-5 mb-2" data-en="JSON Output" data-zh="JSON 输出">JSON Output</h3>
      <pre id="json">{ }</pre>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>

<script>
const PRESETS = [
`The AI market will reach $1.3T by 2030, with 62% of enterprises planning production deployments in 2026. However, contrary to hype, only 23% of current pilots move to production. Vendors should focus on verticalized workflows rather than horizontal platforms. The strategy must shift from model-as-product to outcome-as-product. AI agents today still hallucinate in critical paths — a real unsolved problem.`,
`Enterprise AI adoption hit 78% in 2026, up from 41% in 2024. Gartner reports average spend per enterprise is $4.8M annually. However, many deployments stall at POC. Companies must invest in data readiness before agent rollouts. The winning strategy is top-down executive sponsorship combined with bottom-up tooling choices. AI productivity claims remain largely unverified in the field.`,
`Training a frontier model now costs $200M+, up 3.5x from 2024. But inference costs have dropped 80% in 18 months. Contrary to expectations, model commoditization is accelerating, not slowing. Vendors should pursue specialized fine-tunes over general-purpose scale. The economics favor distillation and mixture-of-experts. AI vendors overstate margins — most still burn cash.`,
`Multi-agent frameworks now handle 45% of enterprise agent workloads. However, orchestration bugs cause 1 in 4 production incidents. Teams must design for graceful degradation and human handoff. The strategy is fewer, smarter agents over swarms. Current multi-agent systems often underperform single well-prompted models.`,
`AI safety incidents reached 340 documented cases in 2025, up 2.1x YoY. However, framework regulations remain inconsistent across jurisdictions. Companies should adopt internal red-team requirements before shipping. The key strategy: treat safety as a product feature, not compliance overhead. The industry's self-regulation claims lack teeth.`
];

const $ = id => document.getElementById(id);
let annotations = [];

function loadPreset() { $('input').value = PRESETS[+$('preset').value]; }
$('preset').addEventListener('change', loadPreset);
loadPreset();

function classify(sentences) {
  const anns = [];
  let critAssigned = false;
  sentences.forEach(s => {
    const lower = s.toLowerCase();
    if (/\b\d+([.,]\d+)?\s*(%|x|m|b|t|k|million|billion|trillion|\$)/i.test(s) || /\$\d/.test(s)) {
      anns.push({ text: s, type: 'data', label: '🔴 Key Data', note: 'Numeric claim — verify source and recency.' });
    } else if (/\b(but|however|contrary|contrarian|despite|nevertheless|yet|although)\b/.test(lower)) {
      anns.push({ text: s, type: 'contra', label: '🟡 Contrarian', note: 'Non-consensus framing — worth examining assumptions.' });
    } else if (/\b(should|must|strategy|focus|pursue|shift|invest|adopt|winning|rollout)\b/.test(lower)) {
      anns.push({ text: s, type: 'strat', label: '🟢 Strategy', note: 'Prescriptive claim — test against your own context.' });
    } else if (!critAssigned && s.length > 40) {
      anns.push({ text: s, type: 'crit', label: '💬 AI Critique', note: 'Broad claim — ask what evidence would disprove it.' });
      critAssigned = true;
    }
  });
  return anns.slice(0, 6);
}

function render(text, anns) {
  let rendered = text;
  // sort by length desc to avoid nested replacement collisions
  [...anns].sort((a,b) => b.text.length - a.text.length).forEach(a => {
    const cls = { data: 'hl-data', contra: 'hl-contra', strat: 'hl-strat', crit: 'hl-crit' }[a.type];
    const safe = a.text.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    rendered = rendered.replace(new RegExp(safe), `<span class="${cls}" title="${a.label}">${a.text}</span>`);
  });
  // append annotations
  const list = anns.map(a => {
    const cls = { data: 'ann-data', contra: 'ann-contra', strat: 'ann-strat', crit: 'ann-crit' }[a.type];
    return `<div class="annotation ${cls}"><b>${a.label}</b> — ${a.note}<br><span class="text-gray-400">"${a.text.slice(0,80)}${a.text.length>80?'…':''}"</span></div>`;
  }).join('');
  $('annotated').innerHTML = `<div class="mb-4">${rendered}</div>${list}`;
  $('json').textContent = JSON.stringify(anns.map(a => ({ type: a.type, text: a.text, note: a.note })), null, 2);
}

$('analyze').addEventListener('click', async () => {
  const btn = $('analyze'); btn.disabled = true;
  $('status').innerHTML = '<span class="pulse"></span> <span data-en="Analyzing..." data-zh="分析中...">Analyzing...</span>';
  await new Promise(r => setTimeout(r, 2000));
  const text = $('input').value;
  const sentences = text.split(/(?<=[.!?。！？])\s+/).filter(s => s.trim().length > 10);
  annotations = classify(sentences);
  render(text, annotations);
  $('status').textContent = `✓ ${annotations.length} annotations`;
  btn.disabled = false;
  setTimeout(() => $('status').textContent = '', 3000);
});

$('post').addEventListener('click', () => {
  const toast = $('toast');
  toast.textContent = '✓ Posted ' + annotations.length + ' annotations to Hypothes.is (simulated)';
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 3000);
});

(function() {
  const STORAGE_KEY = 'sa-toolkit-lang';
  let lang = localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(STORAGE_KEY, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`); if (t) el.textContent = t;
    });
    document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(el => {
      el.placeholder = el.getAttribute(`data-${l}-placeholder`);
    });
    const lab = document.getElementById('lang-label');
    if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => apply(lang === 'en' ? 'zh' : 'en'));
  apply(lang);
})();
</script>
</body>
</html>
