<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hypothesis — Live Annotation Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .card { background: rgba(30,30,50,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(100,100,150,0.2); border-radius: 12px; }
  .gradient-text { background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #lang-toggle { cursor: pointer; } #lang-toggle:hover { background: rgba(100,150,255,0.2); }
  textarea, select { background: #0b1220; color: #e2e8f0; border: 1px solid rgba(100,100,150,0.3); border-radius: 8px; padding: 10px; }
  textarea:focus, select:focus { outline: none; border-color: #60a5fa; }
  .btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; padding: 8px 16px; border-radius: 8px; font-weight: 500; }
  .btn:disabled { opacity: 0.5; }
  .btn-sec { background: rgba(100,100,150,0.2); border: 1px solid rgba(100,100,150,0.3); padding: 8px 16px; border-radius: 8px; color: #e2e8f0; }
  .hl-red { background: rgba(239,68,68,0.18); border-bottom: 2px solid #ef4444; padding: 1px 3px; border-radius: 3px; }
  .hl-yellow { background: rgba(234,179,8,0.18); border-bottom: 2px solid #eab308; padding: 1px 3px; border-radius: 3px; }
  .hl-green { background: rgba(34,197,94,0.18); border-bottom: 2px solid #22c55e; padding: 1px 3px; border-radius: 3px; }
  .hl-blue { background: rgba(59,130,246,0.18); border-bottom: 2px solid #3b82f6; padding: 1px 3px; border-radius: 3px; }
  .annotation { font-size: 12px; padding: 8px 10px; border-radius: 8px; margin-top: 6px; display: block; }
  .ann-red { background: rgba(239,68,68,0.12); border-left: 3px solid #ef4444; }
  .ann-yellow { background: rgba(234,179,8,0.12); border-left: 3px solid #eab308; }
  .ann-green { background: rgba(34,197,94,0.12); border-left: 3px solid #22c55e; }
  .ann-blue { background: rgba(59,130,246,0.12); border-left: 3px solid #3b82f6; }
  .pulse { display: inline-block; width: 10px; height: 10px; background: #60a5fa; border-radius: 50%; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.4); } }
  pre { background: #0b1220; border-radius: 8px; padding: 12px; font-size: 11px; color: #94a3b8; overflow-x: auto; }
</style>
</head>
<body class="min-h-screen">

<div class="fixed top-4 right-4 z-50">
  <button id="lang-toggle" class="px-3 py-1.5 rounded-full bg-gray-800/80 backdrop-blur border border-gray-700 text-sm font-medium text-gray-300 flex items-center gap-2">
    <span>🌐</span><span id="lang-label">中文</span>
  </button>
</div>

<div class="max-w-7xl mx-auto px-6 py-8">
  <a href="/" class="text-sm text-blue-400 hover:text-blue-300" data-en="← Back to home" data-zh="← 返回首页">← Back to home</a>
  <h1 class="text-3xl font-bold mt-3 gradient-text" data-en="Hypothesis Annotator" data-zh="Hypothesis 标注生成器">Hypothesis Annotator</h1>
  <p class="text-gray-400 mt-1" data-en="Paste an article → Python backend classifies each sentence into data / contrarian / strategy / critique." data-zh="粘贴文章 → Python 后端把每句话分类为 数据 / 非共识 / 策略 / 批评。">Paste an article → Python backend classifies each sentence.</p>

  <div class="grid grid-cols-1 lg:grid-cols-2 gap-5 mt-6">
    <div class="card p-5">
      <div class="flex items-center gap-2 mb-3 flex-wrap">
        <select id="preset" class="text-sm">
          <optgroup label="a16z — real articles">
            <option value="0">a16z · Frontier Systems for Physical World (Nov 2025)</option>
            <option value="1">a16z · Prediction Markets: They Grow Up (Nov 2025)</option>
            <option value="2">a16z · Big Ideas 2025 — AI moats (Dec 2024)</option>
            <option value="3">a16z · The Little Tech Agenda (Marc Andreessen)</option>
          </optgroup>
          <optgroup label="Classic — synthetic">
            <option value="4">AI market 2026 · synthetic</option>
            <option value="5">LLM economics · synthetic</option>
            <option value="6">Multi-agent systems · synthetic</option>
          </optgroup>
        </select>
        <button id="analyze" class="btn" data-en="Analyze" data-zh="分析">Analyze</button>
        <a id="source-link" href="#" target="_blank" rel="noopener" class="text-xs text-blue-400 hover:text-blue-300 underline hidden">source ↗</a>
        <span id="status" class="text-sm text-gray-400"></span>
      </div>
      <div id="preset-meta" class="text-xs text-gray-500 mb-2"></div>
      <textarea id="input" rows="20" class="w-full text-sm"></textarea>
    </div>
    <div class="card p-5">
      <h2 class="font-semibold text-purple-300 mb-2" data-en="Annotated" data-zh="已标注">Annotated</h2>
      <div class="flex gap-3 text-xs text-gray-400 mb-3 flex-wrap">
        <span>🔴 <span data-en="Key Data" data-zh="关键数据">Key Data</span></span>
        <span>🟡 <span data-en="Contrarian" data-zh="非共识观点">Contrarian</span></span>
        <span>🟢 <span data-en="Strategy" data-zh="产品策略">Strategy</span></span>
        <span>💬 <span data-en="AI Critique" data-zh="AI 批评">AI Critique</span></span>
      </div>
      <div id="annotated" class="text-sm leading-relaxed text-gray-300"></div>
      <h3 class="font-semibold text-blue-300 mt-5 mb-2" data-en="JSON Output" data-zh="JSON 输出">JSON Output</h3>
      <pre id="json">{ }</pre>
    </div>
  </div>
</div>

<script>
// Real-world excerpts from a16z articles (verbatim quotes woven into a natural paragraph)
// followed by synthetic examples for comparison.
const PRESETS = [
  // 0 — a16z · Frontier Systems for Physical World (Nov 2025)
  {
    title: "Frontier Systems for the Physical World",
    source: "a16z · November 2025",
    url: "https://a16z.com/frontier-systems-for-the-physical-world/",
    text: `Even 95% per-step success yields only 60% on a 10-step task chain, which is why reliability remains robotics' central bottleneck. Recent work shows that π*₀.₆ more than doubles throughput and cuts failure rates by half or more compared to the imitation-only baseline when reinforcement learning is applied to robot tasks. Contrary to the assumption that language models dominate AI progress, these systems represent an incumbent paradigm with diminishing returns. Rather than continuing this path, physical world AI offers an almost unbounded supply of novel problems, data types, feedback signals, and evaluation criteria. However, current Vision-Language-Action models inherit 2D visual features rather than understanding true 3D environments, creating fundamental representation gaps that spatial intelligence must address for genuine physical reasoning. Companies should dispense with both pretrained VLMs and video diffusion backbones entirely, and instead train native embodied foundation models on real interaction data. Investment in simulation infrastructure has outsized leverage on the entire ecosystem and should receive prioritized capital allocation. The critique is sharp: treating robotics as a downstream consumer of NLP-era models misreads where the frontier actually lives.`
  },
  // 1 — a16z · Prediction Markets (Nov 2025)
  {
    title: "Prediction Markets: They Grow Up So Fast",
    source: "a16z · November 2025",
    url: "https://a16z.com/prediction-markets-they-grow-up-so-fast/",
    text: `The prediction market industry is experiencing unexpected growth patterns that defy conventional wisdom. Sports as a share of total volume was actually at an all-time low even as its absolute volume hit an all-time high — a counterintuitive trend that reveals a maturing market. Entertainment, crypto, politics, and culture categories are growing faster than the dominant sports segment, suggesting prediction markets have transcended their initial identity as election-cycle curiosities. However, significant structural limitations constrain institutional adoption: traders must post the full notional value as collateral, meaning a $100 hedge requires $100 in the clearinghouse. A Citadel or Millennium wouldn't do this — the current mechanics exclude sophisticated participants operating on leverage ratios. The industry must prioritize margin trading implementation to unlock institutional capital. Kalshi's recent NFA licensing and CFTC discussions around margin represent essential infrastructure improvements, not optional enhancements. The benchmark problem prediction markets solve is substantial: traditional markets offer agreed-upon benchmarks for every major asset, yet political and economic events previously lacked credible pricing mechanisms. Success ultimately requires normalization — moving beyond novelty toward invisibility, where the technology becomes so mundane that market participants stop questioning whether to use prediction markets and instead focus on how.`
  },
  // 2 — a16z · Big Ideas 2025 (AI moats, Dec 2024)
  {
    title: "Big Ideas 2025 — AI moats",
    source: "a16z · David Haber · Dec 2024",
    url: "https://a16z.com/big-ideas-in-tech-2025/",
    text: `AI has become the ultimate driver of differentiation, transforming software into labor across industries. However, there is a critical counterpoint: while 2024 startups chased messy inbox problems, 2025 demands founders distinguish between temporary competitive advantage and lasting moats. Merely solving a wedge problem 10x better isn't sufficient. Companies must build defensibility through network effects, switching costs, and product virality — the timeless factors that still matter. Startups that conflate the two risk being outflanked by more strategic competitors. The strategic imperative is clear: founders should prioritize expansion into adjacent workflows and core systems of record, not just optimize narrow use cases. This contrasts sharply with the prevailing narrative that AI differentiation automatically creates durable competitive advantages. Without deliberate moat-building, even technically superior AI solutions remain vulnerable to better-capitalized incumbents entering the market. The critique lands on a generation of AI-native startups who assume product velocity alone will preserve them — it will not.`
  },
  // 3 — a16z · The Little Tech Agenda (Marc Andreessen + Ben Horowitz)
  {
    title: "The Little Tech Agenda",
    source: "a16z · Marc Andreessen & Ben Horowitz",
    url: "https://a16z.com/the-little-tech-agenda/",
    text: `Productivity growth today, after 50 years of the proliferation of the profoundly powerful technologies of the computer and the Internet, is lower than before the 1970's. Government hostility toward startups represents the core problem. Regulatory agencies have been green lit to use brute force investigations, prosecutions, intimidation, and threats to hobble new industries such as Blockchain, and are simultaneously targeting artificial intelligence development. Immediate policy reversals are required: regulatory capture in healthcare, education, and housing must be stripped away to drive higher quality at lower prices. Policymakers should expand high-skilled immigration and launch a whole-of-government program to drive the success of US technology companies globally, against a hostile China and a regulation-crazed EU. Contrary to widespread belief that America's best days are behind us, there is no reason the 21st Century cannot become a Second American Century if government genuinely enables startup innovation and competition rather than protecting incumbent interests. The critique is direct: incumbent-protection masquerades as consumer protection, and little tech has paid the price.`
  },
  // 4 — synthetic (kept for comparison)
  {
    title: "AI market 2026",
    source: "Synthetic example",
    url: null,
    text: `The AI market will reach $1.3T by 2030, with 62% of enterprises planning production deployments in 2026. However, contrary to hype, only 23% of current pilots move to production. Vendors should focus on verticalized workflows rather than horizontal platforms. The strategy must shift from model-as-product to outcome-as-product. AI agents today still hallucinate in critical paths — a real unsolved problem.`
  },
  // 5 — synthetic
  {
    title: "LLM economics",
    source: "Synthetic example",
    url: null,
    text: `Training a frontier model now costs $200M+, up 3.5x from 2024. But inference costs have dropped 80% in 18 months. Contrary to expectations, model commoditization is accelerating, not slowing. Vendors should pursue specialized fine-tunes over general-purpose scale. The economics favor distillation and mixture-of-experts.`
  },
  // 6 — synthetic
  {
    title: "Multi-agent systems",
    source: "Synthetic example",
    url: null,
    text: `Multi-agent frameworks now handle 45% of enterprise agent workloads. However, orchestration bugs cause 1 in 4 production incidents. Teams must design for graceful degradation and human handoff. The strategy is fewer, smarter agents over swarms.`
  }
];

const $ = id => document.getElementById(id);

function loadPreset() {
  const p = PRESETS[+$('preset').value];
  if (!p) return;
  $('input').value = p.text;
  $('preset-meta').textContent = `${p.source} · ${p.text.length} chars`;
  const link = $('source-link');
  if (p.url) {
    link.href = p.url;
    link.classList.remove('hidden');
  } else {
    link.classList.add('hidden');
  }
  // Clear previous results when switching preset
  $('annotated').innerHTML = '';
  $('json').textContent = '{ }';
  $('status').textContent = '';
}
$('preset').addEventListener('change', loadPreset);
loadPreset();

function colorClass(color, prefix) {
  return `${prefix}-${color}`;
}

function render(text, anns) {
  let rendered = text;
  [...anns].sort((a,b) => b.sentence.length - a.sentence.length).forEach(a => {
    const safe = a.sentence.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    try {
      rendered = rendered.replace(new RegExp(safe), `<span class="${colorClass(a.color,'hl')}" title="${a.label}">${a.sentence}</span>`);
    } catch (e) { /* skip */ }
  });
  const list = anns.map(a => `
    <div class="annotation ${colorClass(a.color,'ann')}">
      <b>${a.label}</b> — ${a.note}<br>
      <span class="text-gray-400">"${a.sentence.slice(0,120)}${a.sentence.length>120?'…':''}"</span>
    </div>`).join('');
  $('annotated').innerHTML = `<div class="mb-4">${rendered}</div>${list}`;
  $('json').textContent = JSON.stringify(anns.map(a => ({
    tag: a.tag, color: a.color, sentence: a.sentence, note: a.note
  })), null, 2);
}

$('analyze').addEventListener('click', async () => {
  const btn = $('analyze'); btn.disabled = true;
  $('status').innerHTML = '<span class="pulse"></span> <span>Analyzing...</span>';
  const text = $('input').value;
  try {
    const res = await fetch('/api/hypothesis', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      $('status').textContent = '✗ ' + (err.error || res.status);
      $('annotated').innerHTML = `<div class="text-red-400">Backend error — API at /api/hypothesis is required.</div>`;
      btn.disabled = false;
      return;
    }
    const data = await res.json();
    const anns = data.annotations || [];
    render(text, anns);
    $('status').textContent = `✓ ${anns.length} annotations`;
  } catch (e) {
    $('status').textContent = '✗ network error';
    $('annotated').innerHTML = `<div class="text-red-400">Network error: ${e.message}. The Python API at /api/hypothesis is required.</div>`;
  }
  btn.disabled = false;
  setTimeout(() => $('status').textContent = '', 4000);
});

(function() {
  const STORAGE_KEY = 'sa-toolkit-lang';
  let lang = localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(STORAGE_KEY, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`); if (t) el.textContent = t;
    });
    document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(el => {
      el.placeholder = el.getAttribute(`data-${l}-placeholder`);
    });
    const lab = document.getElementById('lang-label');
    if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => apply(lang === 'en' ? 'zh' : 'en'));
  apply(lang);
})();
</script>
</body>
</html>
