const EXAMPLES = {
  'cn-llm': `# 中国大模型格局 2024-2025

DeepSeek 在 2024 年底发布 V3 模型，参数规模 671B，MoE 架构，训练成本据官方公布约 557 万美元。然而第三方复现估算训练成本接近 1200 万美元，两个数字存在较大差异。

智谱 AI 于 2024 年底完成新一轮融资，估值 200 亿人民币，由中关村投资领投，旗下 GLM-4 Plus 模型在中文推理任务上得分 76.4 分。

字节跳动的豆包（Doubao）模型在 2025 年初将推理成本下调到每百万 token 0.0008 美元，远低于 GPT-4o 的 2.5 美元水平，这一价格战被视为行业里程碑。

阿里巴巴的通义千问 Qwen2.5 系列开源权重，72B 模型在 Hugging Face 下载量超过 200 万次，成为 2024 年下载量最高的中文开源模型之一。

月之暗面 Kimi 在 2024 年 Q3 融资 10 亿美元，估值 33 亿美元，但 2025 年 Q1 流量大幅下滑，日活从 130 万降到 80 万。部分分析师认为 Kimi 估值被高估。

百川智能聚焦医疗场景，Baichuan-M1 医疗大模型通过国家医师资格考试模拟题，官方得分 93 分。然而独立评测机构 CMExam 给出的分数是 87 分，相差 6 分。

反方观点：多位业内人士指出，中国大模型估值泡沫严重，除了字节和阿里，其他公司在 2025 年面临融资困难。应专注商业化落地而非参数竞赛。

关键洞察：开源 + 低价 + 垂直场景成为差异化策略。通用大模型的头部效应正在向少数几家集中。`,

  'cn-ev': `# 2024 中国新能源车市场速览

比亚迪 2024 全年销量 427 万台，全球新能源车销量第一。其中纯电车型 176 万台，插混 251 万台。毛利率从 2023 年的 21.6% 上升到 22.8%。

然而反方观点：第三方研究机构乘联会给出的比亚迪 2024 销量是 425 万台，与官方数字差 2 万台。可能是统计口径不同（工厂出货 vs 终端交付）。

理想汽车 2024 交付量 50.05 万台，同比增长 33.1%，毛利率 20.5%。L9 单车型售价区间 42.98-52.98 万元，平均售价 47 万元。

蔚来 2024 交付 22.2 万台，毛利率 9.9%，仍处于亏损。2024 年净亏损约 207 亿元。然而另一份财报披露净亏损接近 220 亿元，差 13 亿元。

小鹏 2024 交付 19 万台，MONA M03 单月销量突破 2 万台，P7+ 上市后订单超 3 万。

小米 SU7 自 3 月上市至年底交付 13.68 万台，估值 5000 亿港元。产能瓶颈导致订单积压到 2025 年下半年。

特斯拉 2024 中国区销量 66 万台，同比下滑 3.1%。Model Y 依然是单一车型销量冠军。

反方观点：价格战已经持续三年，2025 年利润率进一步承压。预计有 2-3 家新势力会被并购或退出。

关键趋势：增程+纯电并行、智驾成为核心卖点、出海加速、供应链国产化。`,

  'en-ai-cs': `# AI customer service landscape — 2026

The AI customer service market is exploding. In 2026, Gartner estimates over 60% of enterprise customer support will be handled by AI agents. However, many deployments have failed because companies underestimated the integration cost.

OpenAI and Anthropic dominate the foundation model layer. But verticalized players like Sierra and Decagon are winning by focusing narrowly on customer service workflows.

Sierra raised 175M at a 4.5B valuation in 2024. However, SEC filings suggest the post-money valuation is closer to 4.2B — a 300M gap.

Decagon reports 120 enterprise customers including Airbnb, Bilt, and Classpass. Their ARR is estimated at 30M per industry analysts, but founder interviews suggest 45M.

The key insight: generic chatbots lose. Companies want outcome-based pricing — pay per resolved ticket, not per API call.

Contrarian view: some argue fully autonomous agents are still 2-3 years away. Human-in-the-loop systems remain safer for regulated industries like healthcare and finance.

Knowledge base quality is the real bottleneck. Most enterprises have fragmented outdated docs. Before deploying any agent, companies must invest in cleaning and structuring their KB.`,

  'mixed': `# AI Infra 观察 · 2025 Q1

NVIDIA 在 2025 Q1 数据中心收入 362 亿美元，同比增长 93%。Blackwell 架构 B200 GPU 供不应求，主要客户是 Microsoft、Meta、AWS、Oracle。

然而分析师 TrendForce 估算 B200 实际交付量仅占订单的 60%，产能受限于 CoWoS 封装。

AMD MI300X 市场份额在 2025 Q1 从 4% 上升到 8%，主要得益于 Meta 的大规模采购。Meta 订单量据官方披露为 40 亿美元，但供应链消息源透露订单接近 55 亿美元。

国内 GPU 厂商：华为昇腾 910B 在 2025 Q1 出货量 30 万卡，壁仞 BR100 约 5 万卡。

Inference cost for GPT-4-class models dropped from 10 USD / 1M tokens in 2023 to 0.5 USD / 1M tokens in early 2025 — a 20x reduction. DeepSeek V3 claims 0.27 USD / 1M tokens, lowest in the industry.

};

const $ = id => document.getElementById(id);
let concepts = [];
let lastLint = null;

function loadExample(key) {
  const text = EXAMPLES[key] || EXAMPLES['cn-llm'];
  $('raw').value = text;
  updateRawStats();
  document.querySelectorAll('.example-pill').forEach(p => p.classList.toggle('active', p.dataset.example === key));
  concepts = []; renderConcepts([]); $('lint-results').classList.add('hidden');
}

function updateRawStats() {
  const t = $('raw').value;
  const paras = t.split(/\n\s*\n/).filter(p => p.trim()).length;
  const zh = (t.match(/[\u4e00-\u9fff]/g) || []).length;
  const en = (t.match(/[A-Za-z]+/g) || []).length;
  $('raw-stats').textContent = `${paras} para · ${t.length} chars · zh/en=${zh}/${en}`;
}

function typePill(type) {
  const labels = { entity: 'entity', metric: 'metric', opinion: 'opinion', claim: 'claim', event: 'event' };
  const lbl = labels[type] || 'concept';
  return `<span class="type-pill type-${type || 'claim'}">${lbl}</span>`;
}

function renderAttributes(attrs) {
  if (!attrs || !Object.keys(attrs).length) return '';
  return '<div class="mt-2">' + Object.entries(attrs).map(([k, v]) => {
    const isConflict = String(v).includes(' / ');
    const valClass = isConflict ? 'text-red-300 font-semibold' : 'attr-val';
    const warn = isConflict ? '<span title="contradiction" class="text-red-400 ml-1">⚠</span>' : '';
    return `<div class="attr-row"><span class="attr-key">${k}</span><span class="${valClass}">${v}</span>${warn}</div>`;
  }).join('') + '</div>';
}

function renderEvidence(ev) {
  if (!ev || !ev.length) return '';
  return '<details class="mt-2"><summary class="text-xs text-gray-500 hover:text-gray-300">' +
         `<span class="inline-block transition-transform">&#9656;</span> ` +
         `<span>source evidence (${ev.length})</span></summary>` +
         ev.map(e => `<div class="evidence-quote">“${e.quote}” <span class="text-gray-600 ml-1">[p${e.para_idx}·s${e.sentence_idx}]</span></div>`).join('') +
         '</details>';
}

function renderConcepts(list) {
  const wiki = $('wiki');
  if (!list.length) {
    wiki.innerHTML = '<p class="text-gray-500 italic">No concepts extracted yet.</p>';
    return;
  }
  wiki.innerHTML = list.map(c => {
    const conf = c.confidence != null ? Math.round(c.confidence * 100) : 0;
    return `
    <div class="concept-card" data-name="${c.name}">
      <div class="flex items-start justify-between gap-2">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="font-semibold text-blue-200">${c.name}</span>
          ${typePill(c.type)}
        </div>
        <span class="text-[10px] text-gray-500 font-mono">conf ${conf}%</span>
      </div>
      <div class="confidence-bar mt-1"><span style="width:${conf}%"></span></div>
      <div class="text-gray-300 text-[12.5px] mt-2 leading-relaxed">${c.summary || ''}</div>
      ${renderAttributes(c.attributes)}
      <div class="mt-2">${(c.cross_links || []).map(l => `<span class="link-badge" data-link="${l}">[[${l}]]</span>`).join('') || '<span class="text-gray-500 text-xs italic">no cross-links</span>'}</div>
      ${renderEvidence(c.evidence)}
    </div>`;
  }).join('');

  // click [[link]] → scroll to that concept card
  wiki.querySelectorAll('[data-link]').forEach(el => {
    el.addEventListener('click', () => {
      const target = wiki.querySelector(`[data-name="${el.dataset.link}"]`);
      if (target) { target.scrollIntoView({behavior:'smooth', block:'center'}); target.classList.add('ring-2','ring-purple-400'); setTimeout(()=>target.classList.remove('ring-2','ring-purple-400'), 1200); }
    });
  });
}

$('extract-btn').addEventListener('click', async () => {
  const btn = $('extract-btn');
  btn.disabled = true;
  $('status').innerHTML = '<span class="spinner"></span><span>Extracting…</span>';
  try {
    const res = await fetch('/api/karpathy?action=extract', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: $('raw').value, n: +$('n-input').value || 8 })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      $('status').textContent = '✗ ' + (err.error || res.status);
      $('wiki').innerHTML = `<div class="text-red-400">Backend error — /api/karpathy?action=extract is required.</div>`;
      btn.disabled = false;
      return;
    }
    const data = await res.json();
    concepts = data.concepts || [];
    renderConcepts(concepts);
    const contras = concepts.filter(c => Object.values(c.attributes||{}).some(v=>String(v).includes(' / ')));
    $('status').innerHTML = `Extracted <b>${concepts.length}</b> concepts` +
      (contras.length ? ` · <span class="text-red-400">${contras.length} with conflicting values</span>` : '');
  } catch (e) {
    $('status').textContent = '✗ network error';
    $('wiki').innerHTML = `<div class="text-red-400">Network error: ${e.message}.</div>`;
  }
  btn.disabled = false;
  setTimeout(() => $('status').innerHTML = '', 6000);
});

$('lint-btn').addEventListener('click', async () => {
  const results = $('lint-results');
  results.classList.remove('hidden');
  results.innerHTML = '<div class="card p-4"><div class="flex items-center gap-2"><span class="spinner"></span><span>Running checks…</span></div></div>';
  if (!concepts.length) {
    results.innerHTML = `<div class="card p-4 text-amber-300">Extract concepts first, then run Lint.</div>`;
    return;
  }
  try {
    const res = await fetch('/api/karpathy?action=lint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ concepts })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      results.innerHTML = `<div class="card p-4 text-red-400">Backend error — ${err.error || res.status}</div>`;
      return;
    }
    const r = await res.json();
    lastLint = r;
    const pill = (ok, text) => `<span class="${ok?'lint-ok':'lint-warn'}">${ok?'✓':'⚠'} ${text}</span>`;
    const healthColor = r.health_score >= 80 ? 'lint-ok' : r.health_score >= 50 ? 'lint-warn' : 'lint-err';
    const contraBlock = (r.numeric_contradictions && r.numeric_contradictions.length) ? `
      <div class="mt-2">
        <div class="text-sm font-semibold text-red-400 mb-1">⚠ Numeric contradictions (${r.numeric_contradictions.length})</div>
        ${r.numeric_contradictions.map(c => `
          <div class="contradiction-card">
            <div class="text-red-200 font-semibold text-sm">${c.concept} · ${c.metric}</div>
            <div class="text-xs text-gray-400 mt-0.5">conflicting values: <span class="text-red-300 font-mono">${c.values.join(' / ')}</span></div>
          </div>`).join('')}
      </div>` : '';
    const negBlock = (r.negation_contradictions && r.negation_contradictions.length) ? `
      <div class="mt-2">
        <div class="text-sm font-semibold text-amber-400 mb-1">⚠ Negation conflicts (${r.negation_contradictions.length})</div>
        ${r.negation_contradictions.map(c => `
          <div class="contradiction-card" style="border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.06)">
            <div class="text-amber-200 font-semibold text-sm">${c.concept}</div>
            ${c.claims.map(q => `<div class="text-xs text-gray-400 mt-1">• ${q}</div>`).join('')}
          </div>`).join('')}
      </div>` : '';
    results.innerHTML = `
      <div class="card p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold text-blue-300">Lint — ${r.total_issues} issue(s)</h3>
          <span class="${healthColor} font-mono text-sm">health ${r.health_score}/100</span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-2 text-xs text-gray-400 mb-2">
          <div>avg attrs / concept: <b class="text-gray-200">${r.avg_attributes_per_concept}</b></div>
          <div>avg evidence / concept: <b class="text-gray-200">${r.avg_evidence_per_concept}</b></div>
        </div>
        <div class="lint-row">${pill(r.orphaned.length===0, `Orphaned: ${r.orphaned.length ? r.orphaned.join(', ') : 'none'}`)}</div>
        <div class="lint-row">${pill(r.short_summaries.length===0, `Short summaries: ${r.short_summaries.length ? r.short_summaries.join(', ') : 'none'}`)}</div>
        <div class="lint-row">${pill(r.duplicates.length===0, `Duplicate names: ${r.duplicates.length ? r.duplicates.map(p=>p.join(' ~ ')).join('; ') : 'none'}`)}</div>
        <div class="lint-row">${pill(r.unsourced.length===0, `Unsourced: ${r.unsourced.length ? r.unsourced.join(', ') : 'none'}`)}</div>
        ${contraBlock}
        ${negBlock}
      </div>`;
  } catch (e) {
    results.innerHTML = `<div class="card p-4 text-red-400">Network error: ${e.message}</div>`;
  }
});

$('clear-btn').addEventListener('click', () => loadExample('cn-llm'));
$('raw').addEventListener('input', updateRawStats);
document.querySelectorAll('.example-pill').forEach(p => p.addEventListener('click', () => loadExample(p.dataset.example)));

// ══════════════════════════════════════════════════════════════════════
// VIEW TABS — List / Graph / Compare / Brief
// ══════════════════════════════════════════════════════════════════════
const TYPE_COLORS = {
  entity: '#60a5fa', metric: '#34d399', opinion: '#fbbf24',
  claim: '#a78bfa', event: '#f472b6',
};
let cy = null;
let compareSelected = new Set();

document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => switchView(tab.dataset.view));
});

function switchView(view) {
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
  ['list', 'graph', 'compare', 'brief'].forEach(v => $(`view-${v}`).classList.toggle('hidden', v !== view));
  if (view === 'graph') renderGraph();
  if (view === 'compare') renderComparePicker();
  if (view === 'brief') renderBriefPicker();
}

// ── Graph view ──
async function renderGraph() {
  if (!concepts.length) {
    $('cy').innerHTML = '<div class="flex items-center justify-center h-full text-gray-500 italic text-sm">Extract concepts first.</div>';
    $('graph-stats').textContent = '';
    $('graph-legend').innerHTML = '';
    return;
  }
  let data;
  try {
    const res = await fetch('/api/karpathy?action=graph', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ concepts })
    });
    data = await res.json();
  } catch (e) {
    $('cy').innerHTML = `<div class="p-4 text-red-400 text-sm">graph API error: ${e.message}</div>`;
    return;
  }

  // Legend
  $('graph-legend').innerHTML = Object.entries(data.type_counts || {}).map(([t, n]) =>
    `<span class="legend-pill"><span class="legend-dot" style="background:${TYPE_COLORS[t] || '#94a3b8'}"></span>${t} · ${n}</span>`
  ).join('');
  $('graph-stats').textContent = `${data.nodes.length} nodes · ${data.edges.length} edges · ${data.num_contradictions} with ⚠ conflicts`;

  // Clean slate
  $('cy').innerHTML = '';
  if (typeof cytoscape === 'undefined') {
    $('cy').innerHTML = `<div class="p-4 text-red-400 text-sm">cytoscape.js failed to load (network blocked?).</div>`;
    return;
  }
  cy = cytoscape({
    container: $('cy'),
    elements: [
      ...data.nodes.map(n => ({ data: n })),
      ...data.edges.map(e => ({ data: { id: `${e.source}__${e.target}`, source: e.source, target: e.target } }))
    ],
    style: [
      { selector: 'node', style: {
        'background-color': n => TYPE_COLORS[n.data('type')] || '#94a3b8',
        'label': 'data(label)',
        'color': '#e2e8f0',
        'font-size': 11,
        'font-family': "'Inter', sans-serif",
        'text-margin-y': -6,
        'text-outline-width': 2,
        'text-outline-color': '#0f172a',
        'width': n => 24 + 20 * (n.data('confidence') || 0.5),
        'height': n => 24 + 20 * (n.data('confidence') || 0.5),
        'border-width': n => n.data('has_contradiction') ? 3 : 1,
        'border-color': n => n.data('has_contradiction') ? '#ef4444' : 'rgba(255,255,255,0.2)',
      } },
      { selector: 'edge', style: {
        'width': 1.5, 'line-color': 'rgba(167,139,250,0.35)',
        'curve-style': 'straight', 'target-arrow-shape': 'none',
      } },
      { selector: 'node:selected', style: {
        'border-width': 3, 'border-color': '#fcd34d',
      } },
    ],
    layout: { name: 'cose', animate: true, animationDuration: 600, idealEdgeLength: 120, nodeRepulsion: 8000, padding: 30 },
    minZoom: 0.3, maxZoom: 3,
    wheelSensitivity: 0.25,
  });

  cy.on('tap', 'node', (evt) => {
    const n = evt.target.data();
    const c = concepts.find(x => x.name === n.id);
    if (!c) return;
    const attrList = Object.entries(c.attributes || {}).map(([k, v]) => {
      const conflict = String(v).includes(' / ');
      return `<li class="${conflict ? 'text-red-300' : ''}">${k}: <b>${v}</b>${conflict ? ' ⚠' : ''}</li>`;
    }).join('');
    $('graph-detail').innerHTML = `
      <div class="card p-3">
        <div class="font-bold text-blue-200 mb-1">${c.name} <span class="ml-2 type-pill type-${c.type}">${c.type}</span></div>
        ${attrList ? `<ul class="list-disc ml-5 text-[11px] space-y-0.5">${attrList}</ul>` : '<span class="italic text-gray-500 text-xs">no attrs</span>'}
        ${(c.evidence || []).length ? `<div class="mt-2 text-[11px] text-gray-400 italic">“${c.evidence[0].quote.slice(0, 200)}”</div>` : ''}
      </div>`;
  });
  cy.on('tap', (evt) => { if (evt.target === cy) $('graph-detail').innerHTML = ''; });
}

$('graph-fit').addEventListener('click', () => { if (cy) cy.fit(null, 40); });

// ── Compare view ──
function renderComparePicker() {
  const picker = $('compare-picker');
  if (!concepts.length) {
    picker.innerHTML = '<p class="text-gray-500 italic text-sm">Extract concepts first.</p>';
    $('compare-run').disabled = true;
    return;
  }
  picker.innerHTML = concepts.map(c => {
    const checked = compareSelected.has(c.name);
    return `<label class="compare-check ${checked ? 'checked' : ''}">
      <input type="checkbox" ${checked ? 'checked' : ''} data-cmp="${c.name}"/>
      <span class="type-pill type-${c.type}" style="font-size:9px;">${c.type}</span>
      <span>${c.name}</span>
    </label>`;
  }).join('');
  picker.querySelectorAll('input[data-cmp]').forEach(el => {
    el.addEventListener('change', () => {
      if (el.checked) { compareSelected.add(el.dataset.cmp); }
      else { compareSelected.delete(el.dataset.cmp); }
      if (compareSelected.size > 5) {
        const first = compareSelected.values().next().value;
        compareSelected.delete(first);
      }
      renderComparePicker();
    });
  });
  $('compare-run').disabled = compareSelected.size < 2;
}

$('compare-run').addEventListener('click', async () => {
  const names = [...compareSelected];
  if (names.length < 2) return;
  $('compare-output').innerHTML = '<div class="p-3"><span class="spinner"></span> <span class="ml-2 text-gray-400 text-sm">Pivoting attributes…</span></div>';
  try {
    const res = await fetch('/api/karpathy?action=compare', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ concepts, names })
    });
    const data = await res.json();
    if (!data.rowcount) {
      $('compare-output').innerHTML = '<p class="text-amber-300 text-sm p-3">Selected concepts have no extracted attributes to compare.</p>';
      return;
    }
    const conflictRows = data.metrics.filter(r => r.has_contradiction).length;
    const tbl = `
      <div class="text-xs text-gray-500 mb-2">
        ${data.selected.length} concepts · ${data.metrics.length} metrics · ${conflictRows} row(s) with conflicts
      </div>
      <div class="overflow-x-auto">
      <table class="compare-table">
        <thead>
          <tr>
            <th class="metric-col">Metric</th>
            ${data.selected.map(n => `<th>${n}<br><span class="text-[10px] font-normal text-gray-500">type=${data.types[n]||'—'} · conf=${Math.round((data.confidence[n]||0)*100)}%</span></th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${data.metrics.map(row => `
            <tr class="${row.has_contradiction ? 'has-conflict' : ''}">
              <td>${row.metric}${row.has_contradiction ? ' ⚠' : ''}</td>
              ${data.selected.map(n => {
                const v = row.values[n];
                if (v == null) return '<td class="cell-empty">—</td>';
                const isConflictVal = String(v).includes(' / ');
                return `<td class="${isConflictVal ? 'cell-conflict' : ''}">${v}</td>`;
              }).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
      </div>`;
    $('compare-output').innerHTML = tbl;
  } catch (e) {
    $('compare-output').innerHTML = `<p class="text-red-400 text-sm p-3">Compare API error: ${e.message}</p>`;
  }
});

// ── Brief view ──
function renderBriefPicker() {
  const sel = $('brief-pick');
  sel.innerHTML = concepts.map(c => `<option value="${c.name}">${c.name}</option>`).join('') || '<option>—</option>';
}

$('brief-run').addEventListener('click', async () => {
  const name = $('brief-pick').value;
  const lang = $('brief-lang').value;
  if (!name) return;
  $('brief-output').innerHTML = '<div class="flex items-center gap-2"><span class="spinner"></span><span class="text-gray-400 text-sm">Compiling brief…</span></div>';
  try {
    const res = await fetch('/api/karpathy?action=brief', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ concepts, name, lang })
    });
    const data = await res.json();
    if (!data.markdown) {
      $('brief-output').innerHTML = `<p class="text-amber-300">No brief could be compiled for "${name}".</p>`;
      $('brief-download').classList.add('hidden');
      return;
    }
    const html = (typeof marked !== 'undefined' && marked.parse) ? marked.parse(data.markdown) : `<pre class="whitespace-pre-wrap">${data.markdown}</pre>`;
    $('brief-output').innerHTML = `<div class="brief-md">${html}</div>`;
    $('brief-download').classList.remove('hidden');
    $('brief-download').onclick = () => {
      const blob = new Blob([data.markdown], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${name.replace(/[\\s/]+/g, '_')}_brief.md`;
      a.click();
      URL.revokeObjectURL(a.href);
    };
  } catch (e) {
    $('brief-output').innerHTML = `<p class="text-red-400">Brief API error: ${e.message}</p>`;
  }
});

// Refresh views when concepts change
const origExtract = $('extract-btn').onclick;
const origRenderConcepts = renderConcepts;
window.renderConcepts = function(list) {
  origRenderConcepts(list);
  compareSelected.clear();
  // If a non-list view is currently active, refresh it
  const active = document.querySelector('.view-tab.active')?.dataset?.view;
  if (active === 'graph') renderGraph();
  if (active === 'compare') renderComparePicker();
  if (active === 'brief') renderBriefPicker();
};

loadExample('cn-llm');
renderConcepts([]);

(function() {
  const STORAGE_KEY = 'sa-toolkit-lang';
  let lang = localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(STORAGE_KEY, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`); if (t) el.textContent = t;
    });
    const lab = document.getElementById('lang-label');
    if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => apply(lang === 'en' ? 'zh' : 'en'));
  apply(lang);
})();
</script>
