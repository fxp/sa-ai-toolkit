<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SA Toolkit — 3-in-1 Sales Agent</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif; margin: 0; }
  .card { background: rgba(30,30,50,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(100,100,150,0.2); border-radius: 12px; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
  .lang-toggle { position: fixed; top: 16px; right: 16px; z-index: 50; padding: 6px 14px; border-radius: 999px; background: rgba(30,30,50,0.8); border: 1px solid rgba(100,100,150,0.3); color: #e2e8f0; font-size: 13px; cursor: pointer; }
  input.field, select.field, textarea.field { padding: 10px 12px; border-radius: 8px; background: rgba(15,23,42,0.7); color: #e2e8f0; border: 1px solid rgba(100,100,150,0.3); font-size: 14px; outline: none; }
  input.field:focus, select.field:focus { border-color: #60a5fa; }
  .btn { padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; border: none; cursor: pointer; }
  .btn:disabled { opacity: 0.4; }
  .btn-ghost { background: rgba(30,30,50,0.6); border: 1px solid rgba(100,100,150,0.3); color: #e2e8f0; }
  .tab-bar { display: flex; gap: 4px; border-bottom: 1px solid rgba(100,100,150,0.3); }
  .tab-btn { padding: 12px 24px; background: transparent; color: #94a3b8; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 14px; font-family: 'JetBrains Mono', monospace; }
  .tab-btn.active { color: #60a5fa; border-bottom-color: #60a5fa; }
  .md-content { font-size: 14px; line-height: 1.7; color: #cbd5e1; }
  .md-content h1 { font-size: 24px; font-weight: bold; margin: 18px 0 12px; color: #f1f5f9; }
  .md-content h2 { font-size: 18px; font-weight: bold; margin: 14px 0 10px; color: #f1f5f9; border-bottom: 1px solid rgba(100,100,150,0.2); padding-bottom: 6px; }
  .md-content h3 { font-size: 16px; font-weight: 600; margin: 12px 0 6px; color: #cbd5e1; }
  .md-content ul, .md-content ol { padding-left: 22px; margin: 8px 0; }
  .md-content table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
  .md-content th, .md-content td { padding: 6px 10px; border-bottom: 1px solid rgba(100,100,150,0.2); text-align: left; }
  .md-content th { background: rgba(59,130,246,0.1); }
  .action-card { padding: 14px; border-radius: 10px; background: rgba(15,23,42,0.5); border: 1px solid rgba(100,100,150,0.2); }
  .change-log-line { font-size: 12px; padding: 4px 8px; border-radius: 4px; margin-bottom: 3px; font-family: 'JetBrains Mono', monospace; }
  .cl-add { background: rgba(34,197,94,0.1); color: #4ade80; }
  .cl-del { background: rgba(248,113,113,0.1); color: #f87171; }
  .cl-mod { background: rgba(59,130,246,0.1); color: #60a5fa; }
  .slide-stage { background: linear-gradient(135deg, #1e1e3e, #2d2d5a); border-radius: 14px; padding: 40px; min-height: 340px; border: 1px solid rgba(100,100,150,0.3); box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
  .timer-big { font-size: 48px; font-weight: bold; font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body>

<button id="lang-toggle" class="lang-toggle"><span id="lang-label">中文</span></button>

<div class="max-w-6xl mx-auto px-6 py-8">
  <a href="/" class="text-sm text-blue-400 hover:text-blue-300" data-en="← Back to home" data-zh="← 返回首页">← Back to home</a>

  <div class="mt-4 mb-6">
    <h1 class="text-3xl font-bold" data-en="SA Toolkit — Gen · Customize · Present" data-zh="SA 工具箱 —— 生成 · 定制 · 演示"></h1>
    <p class="text-slate-400 mt-2" data-en="Complete sales-agent workflow. All logic lives in /api/sa_*." data-zh="完整的售前演示工作流。所有逻辑由 /api/sa_* 驱动。"></p>
  </div>

  <div id="err-banner" class="hidden card p-3 mb-4" style="background: rgba(127,29,29,0.3); border-color: rgba(248,113,113,0.5); color: #fca5a5;"></div>

  <div class="card">
    <div class="tab-bar px-2">
      <button class="tab-btn tab-main active" data-tab="gen">/gen</button>
      <button class="tab-btn tab-main" data-tab="customize">/customize</button>
      <button class="tab-btn tab-main" data-tab="present">/present</button>
    </div>

    <!-- GEN -->
    <div id="panel-gen" class="tab-panel p-6">
      <div class="flex items-center gap-3 flex-wrap">
        <input id="g-company" class="field flex-1 min-w-[240px]" placeholder="Company name (e.g. Tencent)" value="Tencent" />
        <button id="g-run" class="btn" data-en="🔍 Search & Generate" data-zh="🔍 搜索并生成"></button>
      </div>
      <div id="g-progress" class="mt-4 hidden">
        <div class="text-sm text-slate-400 mb-2" id="g-stage-text">Calling /api/sa_toolkit?action=gen ...</div>
        <div class="h-1 bg-slate-700 rounded overflow-hidden"><div id="g-bar" class="h-1 bg-blue-500" style="width:0%; transition: width 0.3s;"></div></div>
      </div>

      <div id="g-output" class="mt-6 hidden">
        <div class="card p-4 mb-4">
          <h3 class="font-bold text-lg mb-2" data-en="Company Snapshot" data-zh="企业快照"></h3>
          <div id="g-snapshot" class="text-sm text-slate-300"></div>
        </div>

        <div class="card p-0">
          <div class="flex border-b border-slate-700 px-2">
            <button class="tab-btn tab-sec active" data-sec="profile" data-en="Profile" data-zh="画像"></button>
            <button class="tab-btn tab-sec" data-sec="scoring" data-en="Scoring" data-zh="评分"></button>
            <button class="tab-btn tab-sec" data-sec="schedule" data-en="Schedule" data-zh="日程"></button>
            <button class="tab-btn tab-sec" data-sec="opening_remarks" data-en="Opening Remarks" data-zh="开场白"></button>
          </div>
          <div id="g-section" class="p-5 md-content"></div>
        </div>
      </div>
    </div>

    <!-- CUSTOMIZE -->
    <div id="panel-customize" class="tab-panel p-6 hidden">
      <div id="c-empty" class="text-center py-16 text-slate-400" data-en="Generate a package first in the /gen tab." data-zh="请先在 /gen 标签页生成方案。"></div>
      <div id="c-ready" class="hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="action-card">
            <div class="font-bold mb-2" data-en="Term Replace" data-zh="术语替换"></div>
            <div class="flex gap-2 flex-wrap">
              <input id="tr-from" class="field flex-1 min-w-[100px]" placeholder="from" />
              <input id="tr-to" class="field flex-1 min-w-[100px]" placeholder="to" />
              <button class="btn" id="tr-run">Run</button>
            </div>
          </div>
          <div class="action-card">
            <div class="font-bold mb-2" data-en="Deepen a Demo" data-zh="深度定制 Demo"></div>
            <div class="flex gap-2">
              <select id="dd-sel" class="field flex-1"></select>
              <button class="btn" id="dd-run">Deepen</button>
            </div>
          </div>
          <div class="action-card">
            <div class="font-bold mb-2" data-en="Switch Audience" data-zh="切换受众"></div>
            <div class="flex gap-2 flex-wrap items-center">
              <label class="text-sm"><input type="radio" name="aud" value="executives" checked> Exec</label>
              <label class="text-sm"><input type="radio" name="aud" value="engineering"> Tech</label>
              <label class="text-sm"><input type="radio" name="aud" value="business"> Business</label>
              <label class="text-sm"><input type="radio" name="aud" value="allhands"> All</label>
              <button class="btn ml-auto" id="aud-run">Regenerate</button>
            </div>
          </div>
        </div>
        <div class="card p-4 mt-5">
          <div class="text-xs uppercase text-slate-500 mb-2" data-en="Change Log" data-zh="变更日志"></div>
          <div id="change-log" style="max-height: 220px; overflow-y: auto;"></div>
        </div>
      </div>
    </div>

    <!-- PRESENT -->
    <div id="panel-present" class="tab-panel p-6 hidden">
      <div id="p-empty" class="text-center py-16 text-slate-400" data-en="Generate a package first in the /gen tab." data-zh="请先在 /gen 标签页生成方案。"></div>
      <div id="p-ready" class="hidden">
        <div class="slide-stage">
          <div class="text-xs uppercase text-blue-300 tracking-wider mb-2">Step <span id="p-idx">1</span> / <span id="p-total">0</span></div>
          <h2 id="p-title" class="text-3xl font-bold mb-4">—</h2>
          <div id="p-remark" class="text-slate-300 text-lg whitespace-pre-wrap"></div>
          <div class="mt-6 flex items-center gap-6">
            <div class="timer-big" id="p-timer">00:00</div>
            <div class="flex gap-2 ml-auto flex-wrap">
              <button class="btn btn-ghost" id="p-prev">← Prev</button>
              <button class="btn" id="p-play">▶ Launch Rehearsal</button>
              <button class="btn btn-ghost" id="p-pause">⏸ Pause</button>
              <button class="btn btn-ghost" id="p-next">Next →</button>
            </div>
          </div>
        </div>
        <div class="mt-5 flex gap-3 flex-wrap">
          <button class="btn" id="p-email">✉ Generate Follow-up Email</button>
        </div>
        <div id="p-output" class="card p-4 mt-4 hidden">
          <pre id="p-output-content" class="mono text-xs whitespace-pre-wrap"></pre>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// --------- tabs ---------
document.querySelectorAll('.tab-main').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tab-main').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
  document.getElementById('panel-' + b.dataset.tab).classList.remove('hidden');
  refreshCustomize(); refreshPresent();
}));
document.querySelectorAll('.tab-sec').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tab-sec').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  renderSection(b.dataset.sec);
}));

// --------- state ---------
const PKG_KEY = 'sa-toolkit-pkg';
let pkgState = JSON.parse(localStorage.getItem(PKG_KEY) || 'null');

function savePkg(p) { pkgState = p; localStorage.setItem(PKG_KEY, JSON.stringify(p)); }
function showErr(msg) { const b = document.getElementById('err-banner'); b.textContent = msg; b.classList.remove('hidden'); }
function clearErr() { document.getElementById('err-banner').classList.add('hidden'); }

// --------- GEN ---------
async function runGen() {
  clearErr();
  const company = document.getElementById('g-company').value.trim() || 'Acme';
  const btn = document.getElementById('g-run');
  btn.disabled = true;
  const prog = document.getElementById('g-progress');
  const out = document.getElementById('g-output');
  prog.classList.remove('hidden'); out.classList.add('hidden');
  const bar = document.getElementById('g-bar');
  bar.style.width = '30%';
  document.getElementById('g-stage-text').textContent = `Calling /api/sa_toolkit?action=gen for "${company}"...`;
  try {
    const res = await fetch('/api/sa_toolkit?action=gen', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ company }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const pkg = await res.json();
    if (pkg.error) throw new Error(pkg.error);
    bar.style.width = '100%';
    savePkg(pkg);
    prog.classList.add('hidden');
    out.classList.remove('hidden');
    renderSnapshot(); renderSection('profile');
  } catch (e) {
    prog.classList.add('hidden');
    showErr(`API error: ${e.message}. Ensure /api/sa_toolkit?action=gen is deployed.`);
  } finally {
    btn.disabled = false;
  }
}

function renderSnapshot() {
  const s = pkgState?.snapshot || {};
  document.getElementById('g-snapshot').innerHTML = `
    <div><b>Company:</b> ${s.name || pkgState?.company || ''}</div>
    <div><b>Industry:</b> ${s.industry || pkgState?.industry || ''}</div>
    <div class="mt-2"><b>Key products:</b> ${(s.products || []).join(', ') || '—'}</div>
    <div><b>Competitors:</b> ${(s.competitors || []).join(', ') || '—'}</div>
    <div class="mt-2 text-slate-400">${s.summary || ''}</div>`;
}
function renderSection(name) {
  if (!pkgState) return;
  document.getElementById('g-section').innerHTML = marked.parse(pkgState[name] || '');
}

document.getElementById('g-run').addEventListener('click', runGen);

// --------- CUSTOMIZE ---------
function refreshCustomize() {
  pkgState = pkgState || JSON.parse(localStorage.getItem(PKG_KEY) || 'null');
  const has = !!pkgState;
  document.getElementById('c-empty').classList.toggle('hidden', has);
  document.getElementById('c-ready').classList.toggle('hidden', !has);
  if (!has) return;
  const ddSel = document.getElementById('dd-sel');
  ddSel.innerHTML = (pkgState.selected || []).map(d => `<option value="${d.id}">${d.name}</option>`).join('');
}

function logChange(msg, cls='cl-mod') {
  const el = document.getElementById('change-log');
  const d = document.createElement('div');
  d.className = 'change-log-line ' + cls;
  d.textContent = `[${new Date().toTimeString().slice(0,8)}] ${msg}`;
  el.prepend(d);
}

async function customizeCall(action, params, label) {
  try {
    const res = await fetch('/api/sa_toolkit?action=customize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ package: pkgState, action, params }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const out = await res.json();
    if (out.error) throw new Error(out.error);
    savePkg(out.package);
    refreshCustomize();
    logChange(`✓ ${label}`, 'cl-add');
    // Re-render current gen section if visible
    const active = document.querySelector('.tab-sec.active');
    if (active) renderSection(active.dataset.sec);
  } catch (e) { showErr(`API error: ${e.message}`); logChange(`✗ ${label} failed: ${e.message}`, 'cl-del'); }
}

document.getElementById('tr-run').addEventListener('click', () => {
  const from = document.getElementById('tr-from').value;
  const to = document.getElementById('tr-to').value;
  if (!from) return;
  customizeCall('replace', { mapping: { [from]: to } }, `Replaced "${from}" → "${to}"`);
});
document.getElementById('dd-run').addEventListener('click', () => {
  const demo_id = document.getElementById('dd-sel').value;
  customizeCall('deepen', { demo_id }, `Deepened "${demo_id}"`);
});
document.getElementById('aud-run').addEventListener('click', () => {
  const audience = document.querySelector('input[name=aud]:checked').value;
  customizeCall('audience', { audience }, `Switched audience → ${audience}`);
});

// --------- PRESENT ---------
let presentState = { idx: 0, plays: [], timer: 0, interval: null, paused: false };

async function refreshPresent() {
  pkgState = pkgState || JSON.parse(localStorage.getItem(PKG_KEY) || 'null');
  const has = !!pkgState;
  document.getElementById('p-empty').classList.toggle('hidden', has);
  document.getElementById('p-ready').classList.toggle('hidden', !has);
  if (!has) return;
  if (!presentState.plays.length) {
    try {
      const res = await fetch('/api/sa_toolkit?action=present', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ package: pkgState, mode: 'rehearse' }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const out = await res.json();
      if (out.error) throw new Error(out.error);
      presentState.plays = out.plays || [];
      presentState.idx = 0;
      document.getElementById('p-total').textContent = presentState.plays.length;
      showStep(0);
    } catch (e) { showErr(`API error: ${e.message}`); }
  }
}
function showStep(i) {
  const p = presentState.plays[i];
  if (!p) return;
  presentState.idx = i;
  document.getElementById('p-idx').textContent = i + 1;
  document.getElementById('p-title').textContent = p.title;
  document.getElementById('p-remark').textContent = p.script;
  presentState.timer = p.seconds;
  updateTimer();
}
function updateTimer() {
  const s = Math.max(0, presentState.timer);
  document.getElementById('p-timer').textContent =
    `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
document.getElementById('p-play').addEventListener('click', () => {
  if (presentState.interval) clearInterval(presentState.interval);
  presentState.paused = false;
  presentState.interval = setInterval(() => {
    if (presentState.paused) return;
    presentState.timer--;
    updateTimer();
    if (presentState.timer <= 0) {
      if (presentState.idx < presentState.plays.length - 1) showStep(presentState.idx + 1);
      else { clearInterval(presentState.interval); presentState.interval = null; }
    }
  }, 1000);
});
document.getElementById('p-pause').addEventListener('click', () => { presentState.paused = !presentState.paused; });
document.getElementById('p-prev').addEventListener('click', () => { if (presentState.idx > 0) showStep(presentState.idx - 1); });
document.getElementById('p-next').addEventListener('click', () => { if (presentState.idx < presentState.plays.length - 1) showStep(presentState.idx + 1); });

document.getElementById('p-email').addEventListener('click', async () => {
  try {
    const res = await fetch('/api/sa_toolkit?action=present', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ package: pkgState, mode: 'email' }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const out = await res.json();
    if (out.error) throw new Error(out.error);
    document.getElementById('p-output').classList.remove('hidden');
    document.getElementById('p-output-content').textContent = out.email || '';
  } catch (e) { showErr(`API error: ${e.message}`); }
});

// --------- init ---------
if (pkgState) { document.getElementById('g-output').classList.remove('hidden'); renderSnapshot(); renderSection('profile'); }
refreshCustomize();

// --------- i18n ---------
(function() {
  const STORAGE_KEY = 'sa-toolkit-lang';
  let lang = localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(STORAGE_KEY, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`); if (t) el.textContent = t;
    });
    const lab = document.getElementById('lang-label');
    if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => apply(lang === 'en' ? 'zh' : 'en'));
  apply(lang);
})();
</script>
</body>
</html>
