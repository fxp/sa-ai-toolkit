<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoResearch for VRP — Autonomous Algorithm Discovery</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
<style>
  body { background: #0b1220; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif; color: #e2e8f0; }
  .card { background: rgba(20, 30, 50, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(100, 120, 180, 0.15); }
  #lang-toggle { cursor: pointer; transition: all 0.2s; }
  #lang-toggle:hover { background: rgba(100,150,255,0.2); }
  pre[class*="language-"] { background: #0a0f1e !important; margin: 0; padding: 12px 14px; font-size: 11px; line-height: 1.55; max-height: 360px; overflow: auto; border-radius: 6px; }
  code[class*="language-"] { font-family: 'JetBrains Mono','SF Mono','Monaco',monospace; }
  .row-kept { background: rgba(16, 185, 129, 0.08); border-left: 2px solid #10b981; }
  .row-revert { background: rgba(239, 68, 68, 0.08); border-left: 2px solid #ef4444; }
  .row-active { background: rgba(59, 130, 246, 0.18); border-left: 2px solid #3b82f6; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.65; } }
  .report h1, .report h2 { color: #fff; font-weight: bold; margin: 0.8em 0 0.4em; }
  .report h1 { font-size: 1.5rem; }
  .report h2 { font-size: 1.2rem; }
  .report p, .report li { color: #94a3b8; }
  .report table { border-collapse: collapse; width: 100%; font-size: 0.85em; margin: 1em 0; }
  .report th, .report td { border: 1px solid #334155; padding: 4px 8px; }
  .report th { background: #1e293b; }
  svg.map .route { stroke-linejoin: round; stroke-linecap: round; fill: none; transition: stroke-width 0.3s; }
  svg.map .depot { fill: #fbbf24; stroke: #f59e0b; stroke-width: 2; }
  svg.map .customer { fill: #64748b; stroke: #0b1220; stroke-width: 0.5; }
</style>
</head>
<body>

<div class="fixed top-4 right-4 z-50">
  <button id="lang-toggle" class="px-3 py-1.5 rounded-full bg-gray-800/80 backdrop-blur border border-gray-700 text-sm font-medium text-gray-300 flex items-center gap-2">
    <span>&#127760;</span><span id="lang-label">EN</span>
  </button>
</div>

<div class="max-w-7xl mx-auto px-4 py-6">

  <div class="mb-6">
    <a href="/" class="text-blue-400 hover:text-blue-300 text-sm" data-en="&#8592; Back to home" data-zh="&#8592; 返回首页"></a>
    <h1 class="text-3xl font-bold text-white mt-2">
      <span data-en="AutoResearch for VRP" data-zh="AutoResearch · 配送路径自动演进"></span>
    </h1>
    <p class="text-gray-400 mt-1 text-sm"
       data-en="Same loop as the scheduling demo, applied to last-mile delivery. 10 solver variants, real Python, real distance metric."
       data-zh="和排产 demo 同一个循环，搬到末端配送。10 个真实 Python 求解器 × 真实总里程评估。"></p>
    <p class="text-xs text-gray-500 mt-2">
      <a href="/autoresearch/" class="text-blue-400 hover:underline" data-en="← Switch to scheduling demo" data-zh="← 切换到排产 demo"></a>
    </p>
  </div>

  <div class="card rounded-lg p-4 mb-4">
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
        <span class="text-xs font-mono bg-blue-900/40 text-blue-300 px-2 py-0.5 rounded">program.md</span>
        <span class="text-xs text-gray-500" data-en="— the agent's goal" data-zh="— Agent 的任务书"></span>
      </div>
      <button id="start-btn" class="px-5 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-bold hover:opacity-90 transition text-sm">
        &#9658; <span data-en="Start autoresearch loop" data-zh="启动自动演进"></span>
      </button>
    </div>
    <div id="program-md" class="text-xs text-gray-300 font-mono whitespace-pre-wrap leading-relaxed"></div>
  </div>

  <div class="grid grid-cols-2 md:grid-cols-5 gap-2 mb-4">
    <div class="card rounded p-3 text-center">
      <div class="text-xs text-gray-500" data-en="Customers" data-zh="客户数"></div>
      <div id="stat-custs" class="text-xl text-white font-bold">—</div>
    </div>
    <div class="card rounded p-3 text-center">
      <div class="text-xs text-gray-500" data-en="Vehicles" data-zh="车辆数"></div>
      <div id="stat-vehicles" class="text-xl text-white font-bold">—</div>
    </div>
    <div class="card rounded p-3 text-center">
      <div class="text-xs text-gray-500" data-en="Capacity" data-zh="单车容量"></div>
      <div id="stat-cap" class="text-xl text-white font-bold">—</div>
    </div>
    <div class="card rounded p-3 text-center">
      <div class="text-xs text-gray-500" data-en="Current dist" data-zh="当前里程"></div>
      <div id="stat-dist" class="text-xl text-blue-400 font-bold">—</div>
    </div>
    <div class="card rounded p-3 text-center">
      <div class="text-xs text-gray-500" data-en="Best dist" data-zh="最优里程"></div>
      <div id="stat-best" class="text-xl text-green-400 font-bold">—</div>
    </div>
  </div>

  <div class="grid md:grid-cols-2 gap-4 mb-4">
    <div class="card rounded-lg">
      <div class="px-4 py-2 border-b border-gray-700 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-xs font-mono bg-purple-900/40 text-purple-300 px-2 py-0.5 rounded">solver.py</span>
          <span id="solver-variant" class="text-sm text-white font-bold"><span data-en="(not started)" data-zh="（未开始）"></span></span>
        </div>
        <span id="solver-iter" class="text-xs text-gray-500">v—</span>
      </div>
      <pre class="!rounded-t-none !rounded-b-lg !m-0"><code id="solver-code" class="language-python"># Press ▶ Start autoresearch loop
# The agent will iterate 10 VRP solver variants.</code></pre>
      <div id="solver-hyp" class="px-4 py-2 border-t border-gray-700 text-xs text-gray-400 italic"></div>
    </div>

    <div class="card rounded-lg">
      <div class="px-4 py-2 border-b border-gray-700 flex items-center justify-between">
        <span class="text-xs font-mono bg-green-900/40 text-green-300 px-2 py-0.5 rounded">results.tsv</span>
        <span id="progress-pct" class="text-xs text-gray-500 font-mono">0 / 10</span>
      </div>
      <div class="max-h-[360px] overflow-y-auto">
        <table class="w-full text-xs font-mono">
          <thead class="bg-gray-900/60 text-gray-400 text-[10px] uppercase tracking-wider sticky top-0">
            <tr>
              <th class="px-2 py-2 text-left">#</th>
              <th class="px-2 py-2 text-left" data-en="variant" data-zh="变体"></th>
              <th class="px-2 py-2 text-right" data-en="dist" data-zh="里程"></th>
              <th class="px-2 py-2 text-right" data-en="Δ" data-zh="Δ"></th>
              <th class="px-2 py-2 text-right" data-en="over-cap" data-zh="超容"></th>
              <th class="px-2 py-2 text-center" data-en="kept" data-zh="保留"></th>
            </tr>
          </thead>
          <tbody id="results-tbody">
            <tr><td colspan="6" class="text-gray-600 text-center py-8 italic" data-en="(no runs yet)" data-zh="（尚无运行）"></td></tr>
          </tbody>
        </table>
      </div>
      <div id="trajectory-msg" class="px-4 py-2 border-t border-gray-700 text-xs text-gray-400 italic min-h-[1.5em]"></div>
    </div>
  </div>

  <div class="card rounded-lg p-4 mb-4">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-white font-bold text-sm">&#128205; <span data-en="Best route map" data-zh="当前最优路径图"></span></h3>
      <div id="route-legend" class="flex flex-wrap items-center gap-3 text-[10px] text-gray-400"></div>
    </div>
    <svg id="map" viewBox="0 0 600 420" class="w-full map bg-gray-900/40 rounded" preserveAspectRatio="xMidYMid meet"></svg>
  </div>

  <div class="card rounded-lg p-4 mb-4">
    <h3 class="text-white font-bold text-sm mb-3">&#128200; <span data-en="Distance over iterations" data-zh="总里程随迭代变化"></span></h3>
    <svg id="chart" viewBox="0 0 700 180" class="w-full" preserveAspectRatio="none"></svg>
  </div>

  <div id="report-section" class="card rounded-lg p-5 hidden">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-white font-bold">&#128221; <span data-en="Trajectory report" data-zh="演进轨迹报告"></span></h3>
      <button id="download-btn" class="px-3 py-1 bg-gray-700 text-gray-300 rounded text-xs hover:bg-gray-600">
        &#11015; <span data-en="Download .md" data-zh="下载 .md"></span>
      </button>
    </div>
    <div id="report-content" class="report"></div>
  </div>

  <footer class="mt-10 text-center text-xs text-gray-500 pb-6">
    <span data-en="Inspired by karpathy/autoresearch · Real Python solvers on a CVRP benchmark"
          data-zh="灵感来自 karpathy/autoresearch · 真实 Python 求解器跑 CVRP 基准"></span>
  </footer>
</div>

<script>
(function() {
  const K = 'sa-toolkit-lang';
  let lang = localStorage.getItem(K) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(K, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`);
      if (t) el.textContent = t;
    });
    document.getElementById('lang-label').textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => apply(lang === 'en' ? 'zh' : 'en'));
  apply(lang);
})();
function getLang() { return localStorage.getItem('sa-toolkit-lang') || 'en'; }
const tMap = (en, zh) => getLang() === 'zh' ? zh : en;

const state = { numIterations: 10, instance: null, results: [], bestDist: null, bestRoutes: null, running: false };

const VEHICLE_COLORS = ['#60a5fa', '#34d399', '#f472b6', '#fb923c', '#a78bfa'];

async function apiGet(a) { const r = await fetch(`/api/vrp?action=${a}&lang=${getLang()}`); if (!r.ok) throw new Error(r.status); return r.json(); }
async function apiPost(a, b) {
  const r = await fetch(`/api/vrp?action=${a}`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({...b, lang: getLang()}),
  });
  if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
  return r.json();
}

function renderInstanceStats(inst) {
  state.instance = inst;
  document.getElementById('stat-custs').textContent = inst.num_customers;
  document.getElementById('stat-vehicles').textContent = inst.num_vehicles;
  document.getElementById('stat-cap').textContent = inst.capacity;
  // Draw empty map with depot + customers
  renderMap(null);
}

function renderSolverCode(res) {
  const nameKey = getLang() === 'zh' ? 'name_zh' : 'name';
  const hypKey = getLang() === 'zh' ? 'hypothesis_zh' : 'hypothesis';
  document.getElementById('solver-variant').textContent = res[nameKey];
  document.getElementById('solver-iter').textContent = `v${res.iter}`;
  const codeEl = document.getElementById('solver-code');
  codeEl.textContent = res.code;
  if (window.Prism) Prism.highlightElement(codeEl);
  document.getElementById('solver-hyp').textContent = '💡 ' + res[hypKey];
}

function appendResultsRow(res, active = false) {
  const tbody = document.getElementById('results-tbody');
  if (tbody.children.length === 1 && tbody.children[0].children.length === 1) tbody.innerHTML = '';
  tbody.querySelectorAll('.row-active').forEach(r => r.classList.remove('row-active'));
  const existing = document.getElementById(`row-${res.iter}`);
  if (existing) existing.remove();
  const nameKey = getLang() === 'zh' ? 'name_zh' : 'name';
  const d = res.metric.total_distance;
  const delta = res.prev_best == null ? null : Math.round((d - res.prev_best) * 10) / 10;
  const deltaStr = delta == null ? '—' : (delta > 0 ? `+${delta.toFixed(1)}` : delta < 0 ? delta.toFixed(1) : '0');
  const deltaCls = delta == null ? '' : (delta < 0 ? 'text-emerald-400' : delta > 0 ? 'text-red-400' : 'text-gray-500');
  const rowCls = active ? 'row-active' : (res.kept ? 'row-kept' : 'row-revert');
  const flag = res.kept ? '<span class="text-emerald-400">✓</span>' : '<span class="text-red-400">✗</span>';
  const overCap = res.metric.over_capacity;
  const overStr = overCap > 0 ? `<span class="text-red-400">${overCap}</span>` : '<span class="text-gray-500">0</span>';

  const tr = document.createElement('tr');
  tr.id = `row-${res.iter}`;
  tr.className = rowCls;
  tr.innerHTML = `
    <td class="px-2 py-1.5 text-gray-400">v${res.iter}</td>
    <td class="px-2 py-1.5 text-white">${res[nameKey]}</td>
    <td class="px-2 py-1.5 text-right text-blue-300 font-bold">${typeof d === 'number' ? d.toFixed(1) : d}</td>
    <td class="px-2 py-1.5 text-right ${deltaCls}">${deltaStr}</td>
    <td class="px-2 py-1.5 text-right">${overStr}</td>
    <td class="px-2 py-1.5 text-center">${flag}</td>
  `;
  tbody.appendChild(tr);
  tbody.parentElement.scrollTop = tbody.parentElement.scrollHeight;

  document.getElementById('trajectory-msg').textContent = res.commentary;
  document.getElementById('progress-pct').textContent = `${res.iter + 1} / ${state.numIterations}`;
  document.getElementById('stat-dist').textContent = typeof d === 'number' ? d.toFixed(1) : d;
  document.getElementById('stat-best').textContent = typeof res.best_so_far === 'number' ? res.best_so_far.toFixed(1) : res.best_so_far;
}

function renderMap(routes) {
  const svg = document.getElementById('map');
  const inst = state.instance;
  if (!inst) return;
  const pad = 20;
  const W = 600, H = 420;
  // Map 0..100 coordinate space into SVG
  const sx = x => pad + (x / 100) * (W - 2 * pad);
  const sy = y => H - pad - (y / 100) * (H - 2 * pad);

  let body = '';
  if (routes && routes.length) {
    for (let v = 0; v < routes.length; v++) {
      const r = routes[v];
      if (!r.customers || !r.customers.length) continue;
      const color = VEHICLE_COLORS[v % VEHICLE_COLORS.length];
      const path = r.path;
      const pts = path.map(cid => {
        if (cid === 0) return [sx(inst.depot.x), sy(inst.depot.y)];
        const c = inst.customers.find(k => k.id === cid);
        return [sx(c.x), sy(c.y)];
      });
      const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
      body += `<path class="route" d="${d}" stroke="${color}" stroke-width="2" opacity="0.85"/>`;
    }
  }
  // Customers
  for (const c of inst.customers) {
    const rad = 3 + Math.sqrt(c.demand) * 0.7;
    body += `<circle class="customer" cx="${sx(c.x)}" cy="${sy(c.y)}" r="${rad.toFixed(1)}">
      <title>Customer #${c.id}  demand=${c.demand}</title>
    </circle>`;
    body += `<text x="${sx(c.x)}" y="${sy(c.y) - rad - 2}" text-anchor="middle" font-size="8" fill="#94a3b8">${c.id}</text>`;
  }
  // Depot
  body += `<rect class="depot" x="${sx(inst.depot.x) - 7}" y="${sy(inst.depot.y) - 7}" width="14" height="14" rx="2"/>`;
  body += `<text x="${sx(inst.depot.x)}" y="${sy(inst.depot.y) + 3}" text-anchor="middle" font-size="9" font-weight="bold" fill="#0b1220">D</text>`;

  svg.innerHTML = body;

  // Legend
  const legend = document.getElementById('route-legend');
  if (routes && routes.length) {
    legend.innerHTML = routes.map((r, i) => {
      if (!r.customers || !r.customers.length) return '';
      const color = VEHICLE_COLORS[i % VEHICLE_COLORS.length];
      return `<span class="flex items-center gap-1">
        <span class="inline-block w-3 h-2 rounded" style="background:${color}"></span>
        <span>V${i + 1}: ${r.distance.toFixed(1)} / ${r.load}${r.over_capacity > 0 ? ' ⚠' : ''}</span>
      </span>`;
    }).join('');
  } else {
    legend.innerHTML = `<span data-en="depot + customers visible — press Start" data-zh="仓库+客户点已就位，点击启动">${tMap('depot + customers visible — press Start', '仓库+客户点已就位，点击启动')}</span>`;
  }
}

function renderChart() {
  const svg = document.getElementById('chart');
  const pad = {l: 45, r: 20, t: 14, b: 22};
  const W = 700, H = 180;
  const data = state.results;
  if (!data.length) { svg.innerHTML = ''; return; }
  const ds = data.map(r => r.metric.total_distance);
  const dMax = Math.max(...ds) * 1.05;
  const xStep = (W - pad.l - pad.r) / Math.max(1, state.numIterations - 1);
  const y = v => pad.t + (H - pad.t - pad.b) * (1 - v / dMax);
  const x = i => pad.l + i * xStep;

  let runningBest = Infinity;
  const bestTrace = data.map(r => {
    if (r.kept) runningBest = Math.min(runningBest, r.metric.total_distance);
    return isFinite(runningBest) ? runningBest : r.metric.total_distance;
  });
  let bestLine = '', curLine = '', dots = '';
  data.forEach((r, i) => {
    const d = r.metric.total_distance;
    curLine += (i === 0 ? 'M' : 'L') + `${x(i)},${y(d)} `;
    bestLine += (i === 0 ? 'M' : 'L') + `${x(i)},${y(bestTrace[i])} `;
    const color = r.kept ? '#10b981' : '#ef4444';
    dots += `<circle cx="${x(i)}" cy="${y(d)}" r="4" fill="${color}" stroke="#0b1220" stroke-width="1.5"/>`;
  });
  const xTicks = [];
  for (let i = 0; i < state.numIterations; i++) {
    xTicks.push(`<text x="${x(i)}" y="${H - 6}" text-anchor="middle" font-size="9" fill="#64748b">v${i}</text>`);
  }
  const yTicks = [0, 0.5, 1].map(t => {
    const v = dMax * t;
    return `<text x="${pad.l - 6}" y="${y(v) + 3}" text-anchor="end" font-size="9" fill="#64748b">${v.toFixed(0)}</text>
            <line x1="${pad.l}" x2="${W - pad.r}" y1="${y(v)}" y2="${y(v)}" stroke="#1e293b" stroke-dasharray="2,3"/>`;
  }).join('');

  svg.innerHTML = `
    ${yTicks}
    <path d="${bestLine}" stroke="#3b82f6" stroke-width="2" fill="none" stroke-dasharray="4,4" opacity="0.6"/>
    <path d="${curLine}" stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.5"/>
    ${dots}
    ${xTicks.join('')}
    <text x="${pad.l}" y="10" font-size="10" fill="#3b82f6">— best-so-far</text>
    <text x="${pad.l + 110}" y="10" font-size="10" fill="#94a3b8">— per-iter</text>
  `;
}

function renderReport(trajectory) {
  const nameKey = getLang() === 'zh' ? 'name_zh' : 'name';
  const zh = getLang() === 'zh';
  const t0 = trajectory[0].metric.total_distance;
  const drop = Math.round((1 - state.bestDist / t0) * 100);
  let md = (zh ? '# AutoResearch 演进报告 — VRP 配送路径\n\n' : '# AutoResearch trajectory — VRP\n\n')
    + (zh
      ? `**基准**: ${state.instance.num_customers} 客户 × ${state.instance.num_vehicles} 车辆（容量 ${state.instance.capacity}）\n\n**最优总里程**: **${state.bestDist.toFixed(1)}**（从 ${t0.toFixed(1)} 降至 ${state.bestDist.toFixed(1)}，约 ${drop}% 改善）\n\n| 轮次 | 方案 | 总里程 | 超容 | 保留 | Agent 备注 |\n|:---:|:---|--:|--:|:---:|:---|\n`
      : `**Benchmark**: ${state.instance.num_customers} customers × ${state.instance.num_vehicles} vehicles (capacity ${state.instance.capacity})\n\n**Best distance**: **${state.bestDist.toFixed(1)}** (from ${t0.toFixed(1)} down to ${state.bestDist.toFixed(1)}, ~${drop}% improvement)\n\n| iter | variant | distance | over-cap | kept | agent note |\n|:---:|:---|--:|--:|:---:|:---|\n`);
  for (const r of trajectory) {
    const flag = r.kept ? '✓' : '✗';
    md += `| v${r.iter} | ${r[nameKey]} | ${r.metric.total_distance.toFixed(1)} | ${r.metric.over_capacity} | ${flag} | ${r.commentary} |\n`;
  }
  md += zh
    ? '\n## 关键发现\n\n1. 随机分派里程远超贪心，证明geography-aware求解有价值。\n2. 单路径NN违反容量——容量感知的NN将里程砍掉~40%。\n3. Clarke-Wright 1964年的节约算法在本基准上一举锁定绝大部分收益。\n4. 2-opt / Or-opt / 跨路径迁移等局部搜索仅贡献亚百分比级微调。\n5. LNS（摧毁-重建）打破结构性局部最优，把最优推到 558。\n'
    : '\n## Key findings\n\n1. Random dispatch loses badly to any geography-aware solver.\n2. Single-tour NN breaks capacity — capacity-aware NN cuts distance ~40%.\n3. Clarke-Wright (1964) captures nearly all the gain on this benchmark.\n4. Intra-route 2-opt / Or-opt / inter-route relocate give sub-percent polish.\n5. LNS (destroy + repair) breaks structural local optima — drops best to 558.\n';
  document.getElementById('report-content').innerHTML = marked.parse(md);
  document.getElementById('report-section').classList.remove('hidden');
  document.getElementById('download-btn').onclick = () => {
    const blob = new Blob([md], {type: 'text/markdown'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `autoresearch-vrp-${Date.now()}.md`;
    a.click();
  };
}

async function loadInstance() {
  const r = await apiGet('instance');
  state.numIterations = r.num_iterations;
  document.getElementById('program-md').textContent = r.program_md;
  renderInstanceStats(r.instance);
  document.getElementById('progress-pct').textContent = `0 / ${state.numIterations}`;
}

async function runLoop() {
  if (state.running) return;
  state.running = true;
  state.results = []; state.bestDist = null; state.bestRoutes = null;
  document.getElementById('results-tbody').innerHTML = '';
  document.getElementById('report-section').classList.add('hidden');
  document.getElementById('start-btn').disabled = true;
  document.getElementById('start-btn').classList.add('opacity-50');
  try {
    for (let i = 0; i < state.numIterations; i++) {
      document.getElementById('solver-iter').textContent = `v${i}`;
      document.getElementById('solver-variant').textContent = tMap('running…', '运行中…');
      const placeholder = {iter: i, name: 'running…', name_zh: '运行中…',
        metric: {total_distance: '…', over_capacity: 0}, kept: false, prev_best: state.bestDist,
        best_so_far: state.bestDist,
        commentary: tMap(`Evaluating variant v${i} against the frozen benchmark…`,
                         `正在用固定基准评估第 v${i} 号变体…`)};
      appendResultsRow(placeholder, true);

      const res = await apiPost('iterate', {iter_idx: i});
      state.results.push(res);
      if (res.kept) {
        state.bestDist = res.best_so_far;
        state.bestRoutes = res.routes;
      }
      renderSolverCode(res);
      appendResultsRow(res, false);
      renderMap(state.bestRoutes || res.routes);
      renderChart();
      await new Promise(r => setTimeout(r, 350));
    }
    renderReport(state.results);
  } catch (err) {
    document.getElementById('trajectory-msg').innerHTML = `<span class="text-red-400">✗ ${err.message}</span>`;
  } finally {
    state.running = false;
    document.getElementById('start-btn').disabled = false;
    document.getElementById('start-btn').classList.remove('opacity-50');
  }
}

document.getElementById('start-btn').addEventListener('click', runLoop);
loadInstance().catch(err => {
  document.getElementById('program-md').textContent = `Error loading benchmark: ${err.message}`;
});
</script>
</body>
