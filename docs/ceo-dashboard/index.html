<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CEO Agent Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif; color: #e2e8f0; }
  .card { background: rgba(30,30,50,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(100,100,150,0.2); }
  .card:hover { border-color: rgba(100,150,255,0.4); }
  .glow { box-shadow: 0 0 40px rgba(100,150,255,0.15); }
  #lang-toggle { cursor: pointer; transition: all 0.2s; }
  #lang-toggle:hover { background: rgba(100,150,255,0.2); }
  .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 9999px; }
  .pulse-dot { animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  .heat-cell { transition: all 0.3s; }
  .heat-cell:hover { transform: scale(1.1); z-index: 10; }
  .thinking { animation: thinkingPulse 1.5s ease-in-out infinite; }
  @keyframes thinkingPulse { 0%,100%{opacity:0.5}50%{opacity:1} }
</style>
</head>
<body>

<div class="fixed top-4 right-4 z-50">
  <button id="lang-toggle" class="px-3 py-1.5 rounded-full bg-gray-800/80 backdrop-blur border border-gray-700 text-sm font-medium text-gray-300 flex items-center gap-2">
    <span>&#127760;</span><span id="lang-label">EN</span>
  </button>
</div>

<div class="max-w-7xl mx-auto px-4 py-6">

  <div class="mb-6 flex items-start justify-between">
    <div>
      <a href="/" class="text-blue-400 hover:text-blue-300 text-sm" data-en="&#8592; Back to home" data-zh="&#8592; 返回首页"></a>
      <h1 class="text-3xl font-bold text-white mt-2"><span data-en="CEO Agent Dashboard" data-zh="CEO Agent 驾驶舱"></span></h1>
      <p class="text-gray-400 mt-1 text-sm">
        <span class="pulse-dot inline-block w-2 h-2 bg-green-400 rounded-full mr-1"></span>
        <span id="current-time" class="text-gray-300"></span>
        <span class="mx-2">·</span>
        <span id="company-header">Loading…</span>
      </p>
    </div>
    <div class="flex gap-2">
      <input id="company-input" class="px-3 py-2 bg-gray-800/60 border border-gray-700 rounded-lg text-sm text-white" placeholder="Company" value="NewCo Inc" />
      <button id="refresh-brief" class="px-4 py-2 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg text-sm font-bold hover:opacity-90">
        &#128260; <span data-en="Refresh Brief" data-zh="刷新洞察"></span>
      </button>
    </div>
  </div>

  <div id="err-banner" class="hidden mb-4 p-3 rounded-lg bg-red-900/40 border border-red-700 text-red-200 text-sm"></div>

  <div class="card rounded-xl p-6 mb-6 glow border-blue-700/40">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-bold text-white flex items-center gap-2">
        <span>&#127774;</span>
        <span data-en="Morning Brief — AI Insights" data-zh="晨间简报 — AI 洞察"></span>
      </h2>
      <span id="brief-status" class="tag bg-green-900/50 text-green-300">Ready</span>
    </div>
    <div id="brief-content" class="space-y-3"></div>
  </div>

  <div id="metric-tiles" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 mb-6"></div>

  <div class="grid lg:grid-cols-2 gap-4 mb-6">
    <div class="card rounded-xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-bold text-gray-300" data-en="ARR Growth (12 mo)" data-zh="年收入增长 (12个月)"></h3>
        <span class="text-xs text-gray-500" id="arr-target-label"></span>
      </div>
      <canvas id="arr-chart" height="120"></canvas>
    </div>
    <div class="card rounded-xl p-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-bold text-gray-300" data-en="Department Health Radar" data-zh="部门健康度雷达"></h3>
        <span class="text-xs text-gray-500">0-10 composite</span>
      </div>
      <canvas id="dept-radar" height="120"></canvas>
    </div>
  </div>

  <div class="card rounded-xl p-5 mb-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-white font-bold">&#9888; <span data-en="Decisions Awaiting Approval" data-zh="待审批的战略决策"></span></h3>
      <span class="tag bg-red-900/50 text-red-300">3 urgent</span>
    </div>
    <div id="decisions" class="space-y-3"></div>
  </div>

  <div class="grid lg:grid-cols-2 gap-4 mb-6">
    <div class="card rounded-xl p-4">
      <h3 class="text-sm font-bold text-gray-300 mb-3">&#128100; <span data-en="Employee Mood by Dept" data-zh="部门员工情绪热力图"></span></h3>
      <div id="mood-heatmap" class="text-xs"></div>
      <div class="flex items-center gap-2 text-xs text-gray-500 mt-3">
        <span>Low</span>
        <div class="flex gap-0.5">
          <div class="w-4 h-3 bg-red-900"></div><div class="w-4 h-3 bg-orange-700"></div><div class="w-4 h-3 bg-yellow-600"></div><div class="w-4 h-3 bg-green-600"></div><div class="w-4 h-3 bg-green-400"></div>
        </div>
        <span>High</span>
      </div>
    </div>
    <div class="card rounded-xl p-4">
      <h3 class="text-sm font-bold text-gray-300 mb-3">&#128266; <span data-en="Competitor Signals (7 days)" data-zh="竞品动态 (近7天)"></span></h3>
      <div id="competitor-feed" class="space-y-2 max-h-72 overflow-y-auto pr-1"></div>
    </div>
  </div>

  <div class="card rounded-xl p-5 mb-6">
    <h3 class="text-white font-bold mb-4">&#128293; <span data-en="Today's Top 5 Actions (AI-ranked)" data-zh="今日必做 TOP 5 (AI 排序)"></span></h3>
    <div id="actions" class="space-y-2"></div>
  </div>

  <footer class="text-center text-xs text-gray-500 py-6 border-t border-gray-800">
    <span data-en="Inspired by Meta's CEO Agent concept · Synthetic data via /api/ceo_* · Not real company metrics" data-zh="受 Meta CEO Agent 思路启发 · /api/ceo_* 合成数据 · 非真实公司指标"></span>
  </footer>
</div>

<script>
// ========= i18n =========
const STORAGE_KEY = 'sa-toolkit-lang';
function getLang() { return localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en'); }
function setLang(l) {
  localStorage.setItem(STORAGE_KEY, l);
  document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
  document.querySelectorAll('[data-en][data-zh]').forEach(el => {
    const t = el.getAttribute(`data-${l}`); if (t) el.textContent = t;
  });
  const lab = document.getElementById('lang-label');
  if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
}
document.getElementById('lang-toggle').addEventListener('click', () => {
  const nl = getLang() === 'en' ? 'zh' : 'en'; setLang(nl); loadAll();
});
setLang(getLang());

function updateTime() {
  document.getElementById('current-time').textContent = new Date().toLocaleString(undefined, {
    weekday: 'long', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
  });
}
updateTime(); setInterval(updateTime, 60000);

// ========= Error banner =========
function showError(msg) {
  const b = document.getElementById('err-banner');
  b.textContent = msg;
  b.classList.remove('hidden');
}
function clearError() { document.getElementById('err-banner').classList.add('hidden'); }

// ========= API =========
async function fetchJson(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${url} → HTTP ${res.status}`);
  return res.json();
}

function currentCompany() { return document.getElementById('company-input').value.trim() || 'NewCo Inc'; }

// ========= Renderers =========
function renderBrief(brief) {
  const out = document.getElementById('brief-content');
  out.innerHTML = brief.map((b, i) => {
    const color = b.priority === 'high' ? 'red' : b.priority === 'medium' ? 'yellow' : 'blue';
    return `<div class="border-l-4 border-${color}-500 pl-3 py-1">
      <div class="flex items-start gap-2">
        <span class="text-${color}-400 font-bold text-sm flex-shrink-0 mt-0.5">${i+1}.</span>
        <div class="flex-1">
          <div class="text-white font-bold text-sm">${b.title}</div>
          <div class="text-gray-400 text-xs mt-1">${b.detail}</div>
          <div class="text-gray-500 text-[10px] mt-1">Source: ${b.source}</div>
        </div>
        <span class="tag bg-${color}-900/50 text-${color}-300 flex-shrink-0">${b.priority}</span>
      </div>
    </div>`;
  }).join('');
}

function renderMetrics(m) {
  const lang = getLang();
  document.getElementById('company-header').textContent =
    `${m.company} · ${m.headcount.toLocaleString()} ${lang === 'zh' ? '员工' : 'employees'}`;
  const tiles = [
    { lbl: 'ARR', val: m.arr, sub: m.arr_change, color: 'green' },
    { lbl: lang === 'zh' ? '员工数' : 'Headcount', val: m.headcount.toLocaleString(), sub: m.headcount_delta, color: 'blue' },
    { lbl: 'NRR', val: m.nrr, sub: m.nrr_change, color: 'green' },
    { lbl: 'eNPS', val: m.enps, sub: m.enps_change, color: 'yellow' },
    { lbl: lang === 'zh' ? '烧钱倍数' : 'Burn Multiple', val: m.burn, sub: m.burn_label, color: 'green' },
    { lbl: lang === 'zh' ? '现金流' : 'Runway', val: m.runway, sub: m.runway_label, color: 'gray' },
  ];
  document.getElementById('metric-tiles').innerHTML = tiles.map(t => `
    <div class="card rounded-lg p-3">
      <div class="text-xs text-gray-400">${t.lbl}</div>
      <div class="text-xl font-bold text-white">${t.val}</div>
      <div class="text-xs text-${t.color}-400">${t.sub}</div>
    </div>`).join('');
  document.getElementById('arr-target-label').textContent =
    `${m.arr} / $${Math.round(m.series.target[m.series.target.length - 1])}M target`;
  renderCharts(m.series);
}

let arrChart, deptChart;
function renderCharts(s) {
  const arrCtx = document.getElementById('arr-chart').getContext('2d');
  if (arrChart) arrChart.destroy();
  arrChart = new Chart(arrCtx, {
    type: 'line',
    data: { labels: s.labels, datasets: [
      { label: 'ARR ($M)', data: s.arr, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.3 },
      { label: 'Target', data: s.target, borderColor: '#94a3b8', borderDash: [4, 4], fill: false, pointRadius: 0 },
    ] },
    options: { plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 12 } } },
      scales: { x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.03)' } }, y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.03)' } } } }
  });
  const deptCtx = document.getElementById('dept-radar').getContext('2d');
  if (deptChart) deptChart.destroy();
  deptChart = new Chart(deptCtx, {
    type: 'radar',
    data: { labels: s.radar_labels, datasets: [
      { label: 'Current', data: s.radar_current, borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.2)', pointBackgroundColor: '#10b981' },
      { label: 'Last Q', data: s.radar_prev, borderColor: '#64748b', borderDash: [4, 4], backgroundColor: 'rgba(100,116,139,0.1)' },
    ] },
    options: { plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 12 } } },
      scales: { r: { angleLines: { color: 'rgba(255,255,255,0.1)' }, grid: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#94a3b8', font: { size: 10 } }, ticks: { color: '#64748b', backdropColor: 'transparent' }, min: 0, max: 10 } } }
  });
}

function renderDecisions(items) {
  const lang = getLang();
  document.getElementById('decisions').innerHTML = items.map(d => {
    const rc = d.risk === 'high' ? 'red' : d.risk === 'medium' ? 'yellow' : 'green';
    return `<div class="bg-gray-800/50 rounded-lg p-4 border border-gray-700/50">
      <div class="flex items-start gap-3">
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-1">
            <h4 class="text-white font-bold text-sm">${d.title}</h4>
            <span class="tag bg-${rc}-900/50 text-${rc}-300">${d.risk} risk</span>
          </div>
          <div class="text-xs text-blue-300 mb-2">&#129504; ${d.ai_rec}</div>
          <div class="text-xs text-gray-500">Impact: <span class="text-green-400">${d.impact}</span></div>
        </div>
        <div class="flex flex-col gap-2 flex-shrink-0">
          <button class="px-3 py-1 bg-green-600 text-white rounded text-xs font-bold hover:bg-green-500">&check; ${lang === 'zh' ? '批准' : 'Approve'}</button>
          <button class="px-3 py-1 bg-gray-700 text-gray-300 rounded text-xs hover:bg-gray-600">${lang === 'zh' ? '讨论' : 'Discuss'}</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderMood(data) {
  const labels = data.labels;
  const colors = ['bg-red-900', 'bg-orange-700', 'bg-yellow-600', 'bg-green-600', 'bg-green-400'];
  document.getElementById('mood-heatmap').innerHTML = `
    <div class="grid" style="grid-template-columns: 140px repeat(5, 1fr); gap: 4px;">
      <div></div>
      ${labels.map(l => `<div class="text-gray-400 text-center text-[10px]">${l}</div>`).join('')}
      ${data.rows.map(m => `
        <div class="text-gray-300 text-[11px] truncate pr-2 flex items-center justify-between">
          <span>${m.dept}</span><span class="text-gray-500 text-[10px]">${m.size}</span>
        </div>
        ${m.mood.map(v => `<div class="heat-cell ${colors[v-1] || 'bg-gray-800'} h-6 rounded flex items-center justify-center text-[10px] text-white font-bold cursor-pointer">${v}</div>`).join('')}
      `).join('')}
    </div>`;
}

function renderCompetitors(items) {
  document.getElementById('competitor-feed').innerHTML = items.map(c => {
    const icon = c.sentiment === 'threat' ? '&#9888;' : c.sentiment === 'opportunity' ? '&#128640;' : '&#128065;';
    const color = c.sentiment === 'threat' ? 'red' : c.sentiment === 'opportunity' ? 'green' : 'blue';
    return `<div class="flex items-start gap-2 py-1.5 border-b border-gray-800/50">
      <span class="text-${color}-400 text-sm flex-shrink-0">${icon}</span>
      <div class="flex-1 text-xs">
        <div class="text-gray-300">${c.text}</div>
        <div class="text-gray-500 mt-0.5">${c.time} · ${c.source}</div>
      </div>
    </div>`;
  }).join('');
}

function renderActions(items) {
  document.getElementById('actions').innerHTML = items.map(a => `
    <div class="flex items-center gap-3 p-3 bg-gray-800/40 rounded-lg hover:bg-gray-800/70 transition">
      <div class="w-8 h-8 bg-gradient-to-br from-orange-500 to-red-500 rounded-full flex items-center justify-center text-white font-bold text-sm flex-shrink-0">${a.priority}</div>
      <div class="flex-1">
        <div class="text-white text-sm font-medium">${a.title}</div>
        <div class="text-xs text-gray-400 mt-0.5">${a.why}</div>
      </div>
      <div class="text-xs text-gray-500 text-right flex-shrink-0"><div>${a.owner}</div></div>
    </div>`).join('');
}

// ========= Load =========
let briefIdx = 0;

async function loadAll() {
  clearError();
  const c = encodeURIComponent(currentCompany());
  const l = getLang();
  try {
    const [brief, metrics, decisions, mood, competitors, actions] = await Promise.all([
      fetchJson(`/api/ceo?action=brief?company=${c}&idx=${briefIdx}&lang=${l}`),
      fetchJson(`/api/ceo?action=metrics?company=${c}&lang=${l}`),
      fetchJson(`/api/ceo?action=decisions?company=${c}&lang=${l}`),
      fetchJson(`/api/ceo?action=mood?company=${c}&lang=${l}`),
      fetchJson(`/api/ceo?action=competitors?company=${c}&lang=${l}`),
      fetchJson(`/api/ceo?action=actions?company=${c}&lang=${l}`),
    ]);
    renderBrief(brief.brief);
    renderMetrics(metrics);
    renderDecisions(decisions.decisions);
    renderMood(mood);
    renderCompetitors(competitors.feed);
    renderActions(actions.actions);
  } catch (e) {
    showError(`API error: ${e.message}. Ensure /api/ceo_* handlers are deployed.`);
  }
}

document.getElementById('refresh-brief').addEventListener('click', async () => {
  const badge = document.getElementById('brief-status');
  badge.textContent = 'Thinking...';
  badge.className = 'tag bg-blue-900/50 text-blue-300 thinking';
  briefIdx++;
  try {
    const c = encodeURIComponent(currentCompany());
    const l = getLang();
    const brief = await fetchJson(`/api/ceo?action=brief?company=${c}&idx=${briefIdx}&lang=${l}`);
    renderBrief(brief.brief);
    badge.textContent = 'Ready'; badge.className = 'tag bg-green-900/50 text-green-300';
  } catch (e) {
    showError(`API error: ${e.message}`);
    badge.textContent = 'Error'; badge.className = 'tag bg-red-900/50 text-red-300';
  }
});

document.getElementById('company-input').addEventListener('change', loadAll);

loadAll();
</script>
</body>
</html>
