(function() {
  const STORAGE_KEY = 'sa-toolkit-lang';
  let lang = localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(STORAGE_KEY, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`);
      if (t) el.textContent = t;
    });
    const lab = document.getElementById('lang-label');
    if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => { apply(lang === 'en' ? 'zh' : 'en'); setTimeout(renderAll, 50); });
  apply(lang);
})();

function getLang() { return localStorage.getItem('sa-toolkit-lang') || 'en'; }

function renderBrief(thinking = false) {
  const lang = getLang();
  const out = document.getElementById('brief-content');
  if (thinking) {
    out.innerHTML = `<div class="flex items-center gap-2 text-gray-400 thinking">
      <span class="inline-block w-2 h-2 bg-blue-400 rounded-full animate-pulse"></span>
      <span>${lang === 'zh' ? '正在分析 Datadog / Salesforce / Gong / Lattice / GitHub 的信号...' : 'Analyzing signals across Datadog, Salesforce, Gong, Lattice, GitHub...'}</span>
    </div>`;
    return;
  }
  const brief = (BRIEFS[briefIdx % BRIEFS.length][lang] || BRIEFS[briefIdx % BRIEFS.length].en);
  out.innerHTML = brief.map((b, i) => {
    const color = b.priority === 'high' ? 'red' : b.priority === 'medium' ? 'yellow' : 'blue';
    return `<div class="border-l-4 border-${color}-500 pl-3 py-1">
      <div class="flex items-start gap-2">
        <span class="text-${color}-400 font-bold text-sm flex-shrink-0 mt-0.5">${i + 1}.</span>
        <div class="flex-1">

          <div class="text-gray-400 text-xs mt-1">${b.detail}</div>
          <div class="text-gray-500 text-[10px] mt-1">Source: ${b.source}</div>
        </div>
        <span class="tag bg-${color}-900/50 text-${color}-300 flex-shrink-0">${b.priority}</span>
      </div>
    </div>`;
  }).join('');
}

        </div>
        ${m.mood.map(v => `
          <div class="heat-cell ${colors[v - 1] || 'bg-gray-800'} h-6 rounded flex items-center justify-center text-[10px] text-white font-bold cursor-pointer">${v}</div>
        `).join('')}
      `).join('')}
    </div>`;
}

let arrChart, deptChart;
function renderCharts() {
  const arrCtx = document.getElementById('arr-chart').getContext('2d');
  if (arrChart) arrChart.destroy();
  arrChart = new Chart(arrCtx, {
    type: 'line',
    data: {
      labels: ['May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar', 'Apr'],
      datasets: [
        { label: 'ARR ($M)', data: [82, 89, 95, 102, 108, 115, 120, 126, 131, 135, 139, 142], borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.3 },
        { label: 'Target', data: [85, 95, 105, 115, 125, 135, 145, 155, 162, 168, 174, 180], borderColor: '#94a3b8', borderDash: [4, 4], fill: false, pointRadius: 0 },
      ],
    },
    options: {
      plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 12 } } },
      scales: { x: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.03)' } }, y: { ticks: { color: '#64748b' }, grid: { color: 'rgba(255,255,255,0.03)' } } },
    },
  });
  const deptCtx = document.getElementById('dept-radar').getContext('2d');
  if (deptChart) deptChart.destroy();
  deptChart = new Chart(deptCtx, {
    type: 'radar',
    data: {
      labels: ['Engineering', 'Product', 'Sales', 'Marketing', 'CS', 'Finance', 'People', 'Design'],
      datasets: [
        { label: 'Current', data: [7.2, 8.1, 6.8, 8.5, 7.8, 9.0, 8.7, 9.1], borderColor: '#10b981', backgroundColor: 'rgba(16,185,129,0.2)', pointBackgroundColor: '#10b981' },
        { label: 'Last Q', data: [7.8, 7.5, 7.2, 8.0, 7.5, 8.8, 8.3, 8.9], borderColor: '#64748b', borderDash: [4, 4], backgroundColor: 'rgba(100,116,139,0.1)' },
      ],
    },
    options: {
      plugins: { legend: { labels: { color: '#94a3b8', boxWidth: 12 } } },
      scales: { r: { angleLines: { color: 'rgba(255,255,255,0.1)' }, grid: { color: 'rgba(255,255,255,0.1)' }, pointLabels: { color: '#94a3b8', font: { size: 10 } }, ticks: { color: '#64748b', backdropColor: 'transparent' }, min: 0, max: 10 } },
    },
  });
}

function renderAll() {
  renderBrief(); renderDecisions(); renderCompetitors(); renderActions(); renderMoodHeatmap(); renderCharts();
}

document.getElementById('refresh-brief').addEventListener('click', async () => {
  const badge = document.getElementById('brief-status');
  badge.textContent = 'Thinking...';
  badge.className = 'tag bg-blue-900/50 text-blue-300 thinking';
  renderBrief(true);
  await new Promise(r => setTimeout(r, 2000));
  briefIdx++;
  renderBrief(false);
  badge.textContent = 'Ready';
  badge.className = 'tag bg-green-900/50 text-green-300';
});

renderAll();
</script>
