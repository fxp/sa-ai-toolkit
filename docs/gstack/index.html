<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gstack — Terminal Command Simulator</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .card { background: rgba(30,30,50,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(100,100,150,0.2); border-radius: 12px; }
  .gradient-text { background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #lang-toggle { cursor: pointer; } #lang-toggle:hover { background: rgba(100,150,255,0.2); }
  .terminal { background: #09090f; border: 1px solid #1e293b; border-radius: 10px; font-family: 'JetBrains Mono','Fira Code','Menlo',monospace; font-size: 13px; line-height: 1.6; padding: 18px; min-height: 480px; max-height: 640px; overflow-y: auto; white-space: pre-wrap; }
  .prompt { color: #60a5fa; }
  .output { color: #e2e8f0; }
  .highlight { color: #e0e7ff; font-weight: 500; }
  .warn { color: #f59e0b; }
  .err { color: #ef4444; }
  .ok { color: #22c55e; }
  .dim { color: #64748b; }
  select, textarea, button, input { font-family: inherit; }
  select { background: #0b1220; color: #e2e8f0; border: 1px solid rgba(100,100,150,0.3); padding: 6px 12px; border-radius: 8px; }
  textarea { background: #0b1220; color: #e2e8f0; border: 1px solid rgba(100,100,150,0.3); border-radius: 8px; padding: 10px; width: 100%; }
  .btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; padding: 8px 16px; border-radius: 8px; font-weight: 500; }
  .btn:disabled { opacity: 0.5; }
  .btn-sec { background: rgba(100,100,150,0.2); border: 1px solid rgba(100,100,150,0.3); padding: 8px 16px; border-radius: 8px; color: #e2e8f0; }
</style>
</head>
<body class="min-h-screen">

<div class="fixed top-4 right-4 z-50">
  <button id="lang-toggle" class="px-3 py-1.5 rounded-full bg-gray-800/80 backdrop-blur border border-gray-700 text-sm font-medium text-gray-300 flex items-center gap-2">
    <span>🌐</span><span id="lang-label">中文</span>
  </button>
</div>

<div class="max-w-5xl mx-auto px-6 py-8">
  <a href="/" class="text-sm text-blue-400 hover:text-blue-300" data-en="← Back to home" data-zh="← 返回首页">← Back to home</a>
  <h1 class="text-3xl font-bold mt-3 gradient-text" data-en="gstack Terminal" data-zh="gstack 终端">gstack Terminal</h1>
  <p class="text-gray-400 mt-1" data-en="Try gstack slash commands — rendered from the Python backend." data-zh="体验 gstack 斜杠命令 —— 由 Python 后端生成脚本。">Try gstack slash commands — rendered from the Python backend.</p>

  <div class="card p-4 mt-5 flex items-center gap-3 flex-wrap">
    <label class="text-sm text-gray-400" data-en="Command:" data-zh="命令：">Command:</label>
    <select id="cmd">
      <option value="office-hours">/office-hours</option>
      <option value="autoplan">/autoplan</option>
      <option value="qa">/qa</option>
      <option value="ship">/ship</option>
    </select>
    <input id="user-input" class="px-2 py-1 rounded bg-gray-900 border border-gray-700 text-sm w-64" data-en-placeholder="Optional idea for /office-hours" data-zh-placeholder="可选：向 /office-hours 传入一句话" />
    <button id="run" class="btn" data-en="Run" data-zh="运行">Run</button>
    <button id="clear" class="btn-sec" data-en="Clear" data-zh="清空">Clear</button>
  </div>

  <div id="term" class="terminal mt-4"></div>
</div>

<script>
const term = document.getElementById('term');
let running = false;

function appendLine(text, cls) {
  const span = document.createElement('span');
  span.className = cls || 'output';
  span.textContent = text;
  term.appendChild(span);
  term.appendChild(document.createElement('br'));
  term.scrollTop = term.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runCommand() {
  if (running) return;
  running = true;
  const btn = document.getElementById('run');
  btn.disabled = true;
  const cmd = document.getElementById('cmd').value;
  const input = document.getElementById('user-input').value;
  appendLine(`$ gstack /${cmd}`, 'prompt');

  try {
    const url = new URL('/api/gstack', window.location.origin);
    url.searchParams.set('command', cmd);
    if (input) url.searchParams.set('input', input);
    const res = await fetch(url);
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: res.statusText }));
      appendLine('error: ' + (err.error || res.status), 'err');
      running = false; btn.disabled = false; return;
    }
    const data = await res.json();
    const script = data.script || [];
    for (const item of script) {
      await sleep(item.delay_ms || 100);
      appendLine(item.text, item.class || 'output');
    }
    appendLine('', '');
  } catch (e) {
    appendLine('network error: ' + e.message, 'err');
    appendLine('(Backend /api/gstack is required. No JS fallback.)', 'dim');
  }
  running = false;
  btn.disabled = false;
}

document.getElementById('run').addEventListener('click', runCommand);
document.getElementById('clear').addEventListener('click', () => { term.innerHTML = ''; });

appendLine('gstack v1.4.2 — pick a command and hit Run. Script streams from /api/gstack.', 'prompt');
appendLine('', '');

(function() {
  const STORAGE_KEY = 'sa-toolkit-lang';
  let lang = localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(STORAGE_KEY, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`); if (t) el.textContent = t;
    });
    document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(el => {
      el.placeholder = el.getAttribute(`data-${l}-placeholder`);
    });
    const lab = document.getElementById('lang-label');
    if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => apply(lang === 'en' ? 'zh' : 'en'));
  apply(lang);
})();
</script>
</body>
</html>
