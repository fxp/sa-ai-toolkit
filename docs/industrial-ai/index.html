<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Industrial AI Pipeline — Live Demo</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #e2e8f0; }
  .card { background: rgba(30,30,50,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(100,100,150,0.2); }
  .terminal { background: #0a0a1a; border: 1px solid #1e293b; border-radius: 8px; font-family: 'JetBrains Mono','Fira Code',monospace; }
  .prompt { color: #10b981; } .output { color: #94a3b8; } .highlight { color: #60a5fa; } .warn { color: #fbbf24; } .err { color: #ef4444; }
  #lang-toggle { cursor: pointer; transition: all 0.2s; }
  #lang-toggle:hover { background: rgba(100,150,255,0.2); }
  .bbox { stroke: #ef4444; stroke-width: 3; fill: rgba(239,68,68,0.15); animation: pulse 1.5s ease-in-out infinite; }
  .bbox-warn { stroke: #fbbf24; stroke-width: 2; fill: rgba(251,191,36,0.1); }
  .bbox-ok { stroke: #10b981; stroke-width: 2; fill: rgba(16,185,129,0.1); }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .scanline { animation: scan 2s linear infinite; }
  @keyframes scan { 0% { transform: translateY(0); } 100% { transform: translateY(300px); } }
  .btn-primary { background: linear-gradient(135deg, #3b82f6, #8b5cf6); }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 9999px; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
</style>

<script>
(function() {
  const STORAGE_KEY = 'sa-toolkit-lang';
  let lang = localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(STORAGE_KEY, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`);
      if (t) el.textContent = t;
    });
    const lab = document.getElementById('lang-label');
    if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => apply(lang === 'en' ? 'zh' : 'en'));
  apply(lang);
})();

const $ = s => document.querySelector(s);
const delay = ms => new Promise(r => setTimeout(r, ms));
function log(msg, cls = 'output') {
  const el = $('#log');
  const d = document.createElement('div');
  d.className = cls;
  const t = new Date().toLocaleTimeString();
  d.innerHTML = `<span class="text-gray-500">[${t}]</span> ${msg}`;
  el.appendChild(d);
  el.parentElement.scrollTop = el.parentElement.scrollHeight;
}
function setStatus(text, cls = 'text-gray-400') {
  const el = $('#status'); el.textContent = text; el.className = `text-sm ${cls}`;
}
function setBusy(busy) {
  ['#btn-detect', '#btn-predict', '#btn-diagnose', '#btn-run-all'].forEach(s => {
    const b = $(s); if (b) b.disabled = busy;
  });
}
function animateScan(ms) {
  const line = $('#scanline');
  line.setAttribute('opacity', '1');
  setTimeout(() => line.setAttribute('opacity', '0'), ms);
}

function drawBBoxes(detections) {
  const g = $('#visual-overlays');
  g.innerHTML = '';
  (detections || []).forEach((d, i) => {
    const [x, y, w, h] = d.bbox || [50 + i * 80, 80 + i * 60, 60, 50];
    const cx = Math.min(340, Math.max(20, x * 0.2));
    const cy = Math.min(340, Math.max(20, y * 0.35));
    const cw = Math.min(100, Math.max(30, w * 0.25));
    const ch = Math.min(80, Math.max(25, h * 0.25));
    const cls = d.severity === 'high' ? 'bbox' : d.severity === 'medium' ? 'bbox bbox-warn' : 'bbox bbox-ok';
    const color = d.severity === 'high' ? '#ef4444' : d.severity === 'medium' ? '#fbbf24' : '#10b981';
    g.innerHTML += `
      <g>
        <rect x="${cx}" y="${cy}" width="${cw}" height="${ch}" class="${cls}" rx="2"/>
        <rect x="${cx}" y="${cy - 18}" width="${cw + 40}" height="16" fill="${color}" opacity="0.85" rx="2"/>
        <text x="${cx + 4}" y="${cy - 6}" fill="#fff" font-size="10" font-family="monospace" font-weight="bold">
          ${d.label || d.type || 'defect'} ${Math.round((d.confidence || 0.9) * 100)}%
        </text>
      </g>`;
  });
}

function drawSpectrogram(anomalies) {
  const canvas = $('#audio-canvas');
  const ctx = canvas.getContext('2d');
  const W = 400, H = 400;
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  for (let x = 0; x < W; x += 2) {
    for (let y = 0; y < H; y += 2) {
      const t = x / W, f = 1 - y / H;
      let amp = 0.1 + 0.3 * Math.random() + 0.2 * Math.sin(t * 8 + f * 6);
      (anomalies || []).forEach((a, i) => {
        const freqNorm = Math.min(1, (a.freq_hz || 1000) / 10000);
        const targetY = H * (1 - freqNorm);
        if (Math.abs(y - targetY) < 20 && Math.abs(x - (50 + i * 90)) < 40) {
          amp += 0.7 * Math.exp(-Math.abs(y - targetY) / 10) * (a.confidence || 0.85);
        }
      });
      amp = Math.min(1, amp);
      const r = Math.round(amp > 0.6 ? 255 * (amp - 0.6) / 0.4 : 0);
      const gCol = Math.round(amp > 0.3 ? Math.min(255, (amp - 0.3) * 400) : 0);
      const bCol = Math.round(Math.max(0, 200 * (1 - amp)));
      ctx.fillStyle = `rgb(${r},${gCol},${bCol})`;
      ctx.fillRect(x, y, 2, 2);
    }
  }
  ctx.fillStyle = '#64748b';
  ctx.font = '10px monospace';
  ctx.fillText('10kHz', 5, 15);
  ctx.fillText('1kHz', 5, 210);
  ctx.fillText('100Hz', 5, 390);
  ctx.fillText('time →', W - 55, H - 5);
  const markers = $('#audio-markers');
  markers.innerHTML = (anomalies || []).filter(a => a.type !== 'bg').map((a, i) => {
    const freqNorm = Math.min(1, (a.freq_hz || 1000) / 10000);
    const topPct = (1 - freqNorm) * 100;
    const leftPct = 12 + i * 22;
    const color = a.confidence > 0.85 ? 'border-red-400 bg-red-900/80' : 'border-yellow-400 bg-yellow-900/80';
    return `<div class="absolute border-2 ${color} rounded px-1.5 py-0.5 text-[10px] text-white font-mono" style="top:${topPct}%; left:${leftPct}%; transform: translate(-50%,-50%);">
      ${a.label || a.type} ${a.freq_hz}Hz
    </div>`;
  }).join('');
}

function drawPrediction(yield_forecast, rul) {
  const canvas = $('#predict-canvas');
  const ctx = canvas.getContext('2d');
  const W = 400, H = 400;
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#1e293b';
  for (let y = 40; y < H - 40; y += 40) { ctx.beginPath(); ctx.moveTo(40, y); ctx.lineTo(W - 20, y); ctx.stroke(); }
  // Backend returns point_forecast (array of percent values 0-100);
  // older mock used `values` (0-1 fractions). Normalize to 0-1 fractions.
  let pts = (yield_forecast && (yield_forecast.point_forecast || yield_forecast.values)) || Array.from({length: 72}, (_, i) => 0.96 - i * 0.0005 + (Math.random() - 0.5) * 0.003);
  if (pts.length && pts[0] > 2) pts = pts.map(v => v / 100);
  const minY = Math.min(...pts), maxY = Math.max(...pts);
  const range = (maxY - minY) || 0.01;
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2;
  ctx.beginPath();
  pts.forEach((v, i) => {
    const x = 40 + (i / (pts.length - 1)) * (W - 60);
    const y = H - 40 - ((v - minY) / range) * (H - 100);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = '#f59e0b';
  ctx.lineWidth = 2;
  ctx.beginPath();
  const lastX = 40 + (W - 60);
  const lastY = H - 40 - ((pts[pts.length - 1] - minY) / range) * (H - 100);
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(lastX + 30, lastY + 20);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#94a3b8';
  ctx.font = '11px monospace';
  ctx.fillText('Yield %', 8, 20);
  ctx.fillText((maxY * 100).toFixed(1), 8, 50);
  ctx.fillText((minY * 100).toFixed(1), 8, H - 50);
  ctx.fillText('72h', W / 2 - 10, H - 15);
  if (rul) {
    ctx.fillStyle = 'rgba(239,68,68,0.2)';
    ctx.fillRect(W - 140, 20, 120, 60);
    ctx.strokeStyle = '#ef4444';
    ctx.strokeRect(W - 140, 20, 120, 60);
    ctx.fillStyle = '#fca5a5';
    ctx.font = 'bold 10px monospace';
    ctx.fillText('RUL', W - 130, 38);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 24px monospace';
    ctx.fillText(`${rul.rul_hours || rul.hours || 175}h`, W - 130, 62);
    ctx.fillStyle = '#fbbf24';
    ctx.font = '9px monospace';
    ctx.fillText(rul.component || rul.maintenance_urgency || 'Blade#7', W - 130, 75);
  }
}

function currentDataset() {
  const el = document.getElementById('dataset-select');
  return el ? el.value : 'severstal';
}
function withDataset(path) {
  const sep = path.includes('?') ? '&' : '?';
  return `${path}${sep}dataset=${encodeURIComponent(currentDataset())}`;
}
async function apiGet(path) { const r = await fetch(withDataset(path)); return r.json(); }
async function apiPost(path, body = {}) {
  body = { dataset: currentDataset(), ...body };
  const r = await fetch(withDataset(path), { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(body) });
  return r.json();
}

function renderDatasetBanner(ds) {
  if (!ds) return;
  const el = document.getElementById('dataset-banner');
  if (!el) return;
  const classes = (ds.classes || []).map(c => {
    const pct = c.prior != null ? ` ${(c.prior * 100).toFixed(1)}%` : '';
    const cnt = c.count != null ? ` · n=${c.count.toLocaleString()}` : '';
    return `<span class="tag bg-slate-800 text-slate-300 mr-1 mb-1 inline-block">${c.label || c.type}${pct}${cnt}</span>`;
  }).join('');
  el.innerHTML = `
    <div class="flex items-start gap-4 flex-wrap">
      <div class="flex-1 min-w-[250px]">
        <div class="text-slate-200 font-bold text-sm mb-1">
          &#128202; ${ds.name}
          <a href="${ds.url}" target="_blank" rel="noopener" class="text-blue-400 hover:text-blue-300 text-xs ml-2">Kaggle &#8599;</a>
        </div>
        <div class="text-slate-400 text-[11px] mb-2">${ds.source}</div>
        <div class="flex flex-wrap gap-x-4 gap-y-1 text-[11px] text-slate-400">
          <span><span data-en="Images" data-zh="图像数">Images</span>: <span class="text-slate-200 font-mono">${ds.total_images.toLocaleString()}</span></span>
          ${ds.total_objects ? `<span><span data-en="Objects" data-zh="目标数">Objects</span>: <span class="text-slate-200 font-mono">${ds.total_objects.toLocaleString()}</span></span>` : ''}
        </div>
      </div>
      <div class="flex-[2] min-w-[300px]">
        <div class="text-[11px] text-slate-500 mb-1" data-en="Class distribution (real priors)" data-zh="类别分布（真实先验）">Class distribution (real priors)</div>
        <div>${classes}</div>
      </div>
    </div>`;
}

  {
    id: 'casting', name: 'Casting Product — Submersible Pump Impeller',
    source: 'Kaggle / Pilot Technocast (Ravirajsinh Dabhi, 2020)',
    url: 'https://www.kaggle.com/datasets/ravirajsinh45/real-life-industrial-dataset-of-casting-product',
    total_images: 7348,
    classes: [
      { type: 'def_front', label: 'Defective (blow-hole / burr / shrink)', count: 4211, prior: 0.573 },
      { type: 'ok_front',  label: 'OK',                                    count: 3137, prior: 0.427 },
    ],
  },
];

async function loadDatasetInfo() {
  window.__DATASETS__ = DATASETS_FALLBACK;
  // Render immediately from the fallback so the banner is never blank.
  const initial = DATASETS_FALLBACK.find(d => d.id === currentDataset());
  if (initial) renderDatasetBanner(initial);
  // Try to upgrade to live data from the API (adds live fields when available).
  try {
    const data = await fetch('/api/industrial?action=datasets').then(r => r.json());
    if (data && data.datasets && data.datasets.length) {
      window.__DATASETS__ = data.datasets;
      const found = data.datasets.find(d => d.id === currentDataset());
      if (found) renderDatasetBanner(found);
    }
  } catch (e) {
    // keep fallback
  }
}

async function runDetect() {
  setBusy(true); setStatus('Running perception...', 'text-blue-400');
  log('<span class="prompt">&#9655;</span> GET /api/industrial?action=detect — SAM3 + SAM-Audio', 'highlight');
  animateScan(1500);
  await delay(800);
  try {
    const data = await apiGet('/api/industrial?action=detect');
    if (data.visual?.dataset) renderDatasetBanner(data.visual.dataset);
    const visuals = data.visual?.detections || [];
    const audios = data.audio?.anomalies || [];
    const res = data.visual?.resolution;
    if (res) log(`  source: ${data.visual.image} · ${res[0]}×${res[1]}px`, 'output');
    log(`  visual: ${visuals.length} defects found`, 'output');
    log(`  audio: ${audios.length} anomalies detected`, 'output');
    drawBBoxes(visuals);
    drawSpectrogram(audios);
    $('#visual-count').textContent = `${visuals.length} defects`;
    $('#visual-count').className = 'tag ' + (visuals.length ? 'bg-red-900/50 text-red-300' : 'bg-green-900/50 text-green-300');
    $('#audio-count').textContent = `${audios.length} anomalies`;
    $('#audio-count').className = 'tag ' + (audios.length ? 'bg-yellow-900/50 text-yellow-300' : 'bg-green-900/50 text-green-300');
    $('#visual-result').innerHTML = visuals.map(d =>
      `<div class="flex justify-between"><span>${d.label || d.type}</span><span class="text-red-400">${Math.round((d.confidence || 0.9) * 100)}%</span></div>`
    ).join('') || '<div class="text-green-400">✓ No defects detected</div>';
    $('#audio-result').innerHTML = audios.map(a =>
      `<div class="flex justify-between"><span>${a.label || a.type}</span><span class="text-yellow-400">${a.freq_hz}Hz · ${Math.round((a.confidence || 0.85) * 100)}%</span></div>`
    ).join('') || '<div class="text-green-400">✓ Normal acoustic signature</div>';
    setStatus('Perception complete', 'text-green-400');
    log(`<span class="prompt">&check;</span> Perception done`, 'highlight');
    return data;
  } catch (e) {
    log(`<span class="err">&#10005; Error: ${e.message}</span>`, 'err');
    setStatus('Error', 'text-red-400');
  } finally {
    setBusy(false);
  }
}

async function runPredict() {
  setBusy(true); setStatus('Running prediction...', 'text-blue-400');
  log('<span class="prompt">&#9655;</span> GET /api/industrial?action=predict — TimesFM forecast', 'highlight');
  await delay(1000);
  try {
    const data = await apiGet('/api/industrial?action=predict');
    const yf = data.yield_forecast || data.yield;
    const rul = data.rul;
    drawPrediction(yf, rul);
    // Normalize field names: backend uses rul_hours (number), trend (number like -0.0512);
    // format trend as percentage per day string
    const rulHours = rul?.rul_hours ?? rul?.hours ?? 175;
    const rulComp = rul?.component || rul?.maintenance_urgency || 'Blade#7';
    const trendStr = (typeof yf?.trend === 'number')
      ? `${yf.trend >= 0 ? '+' : ''}${yf.trend.toFixed(3)}%/day`
      : (yf?.trend || '-0.05%/day');
    const alertStr = yf?.alert_message || (yf?.alert ? 'threshold crossing alert' : null);
    $('#predict-status').textContent = `RUL ${rulHours}h`;
    $('#predict-status').className = 'tag bg-orange-900/50 text-orange-300';
    $('#predict-result').innerHTML = `
      <div class="flex justify-between"><span>Yield trend</span><span class="text-orange-400">${trendStr}</span></div>
      <div class="flex justify-between"><span>Equipment RUL</span><span class="text-red-400">${rulHours}h</span></div>
      <div class="flex justify-between"><span>Status</span><span class="text-yellow-400">${rulComp}</span></div>
      ${alertStr ? `<div class="text-red-400 text-[11px] mt-1">&#9888; ${alertStr}</div>` : ''}
    `;
    log(`  yield forecast: ${trendStr}`, 'output');
    log(`  RUL: ${rulHours}h (${rulComp})`, 'output');
    setStatus('Prediction complete', 'text-green-400');
    log(`<span class="prompt">&check;</span> Prediction done`, 'highlight');
    return data;
  } catch (e) {
    log(`<span class="err">&#10005; Error: ${e.message}</span>`, 'err');
    setStatus('Error', 'text-red-400');
  } finally {
    setBusy(false);
  }
}

async function runDiagnose() {
  setBusy(true); setStatus('Running diagnosis...', 'text-blue-400');
  log('<span class="prompt">&#9655;</span> POST /api/industrial?action=diagnose — LLM root cause analysis', 'highlight');
  await delay(1500);
  try {
    const data = await apiPost('/api/industrial?action=diagnose', { use_llm: false });
    $('#diag-status').textContent = 'Diagnosis complete';
    $('#diag-status').className = 'tag bg-purple-900/50 text-purple-300';
    const causes = data.root_causes || data.causes || [
      { cause: 'Blade#7 worn', confidence: 0.9 },
      { cause: 'Slurry viscosity drift', confidence: 0.6 },
    ];
    // Backend uses {cause, confidence, action, evidence, priority};
    // earlier mock used {name/label, probability, actions}. Support both.
    const labelOf = c => c.cause || c.name || c.label || 'unknown';
    const confOf = c => c.confidence ?? c.probability ?? 0.5;
    const mainCause = causes[0];
    // Prefer backend "action" per-cause, fallback to top-level recommendations/actions
    const recs = data.recommendations || data.actions
      || (causes.map(c => c.action).filter(Boolean))
      || ['Schedule blade replacement within 48h', 'Increase SAM3 sampling rate 2x', 'Inspect bearing@1200Hz source'];
    $('#diagnosis-output').innerHTML = `
      <div class="grid md:grid-cols-2 gap-4 mb-4">
        <div class="terminal p-3 text-xs">
          <div class="warn">&#9888; <span class="font-bold">Root Cause:</span></div>
          <div class="highlight mt-2 text-sm">${labelOf(mainCause)}</div>
          <div class="output mt-1">Confidence: <span class="text-red-400 font-bold">${Math.round(confOf(mainCause) * 100)}%</span></div>
          ${mainCause.evidence && mainCause.evidence.length ? `<div class="output mt-2 text-[11px] text-gray-500">Evidence: ${mainCause.evidence.join('; ')}</div>` : ''}
        </div>
        <div class="terminal p-3 text-xs">
          <div class="warn">&#128736; <span class="font-bold">Recommended Actions:</span></div>
          ${recs.map(a => `<div class="output mt-1">  • ${a}</div>`).join('')}
        </div>
      </div>
      ${causes.length > 1 ? `
        <div class="text-xs text-gray-400 mb-2">Other contributing factors:</div>
        <div class="space-y-1">
          ${causes.slice(1).map(c => `
            <div class="flex items-center gap-2 text-sm">
              <div class="w-32 text-gray-400">${labelOf(c)}</div>
              <div class="flex-1 bg-gray-900 rounded-full h-2"><div class="bg-orange-500 rounded-full h-2" style="width:${Math.round(confOf(c) * 100)}%"></div></div>
              <span class="text-xs text-orange-300 w-12 text-right">${Math.round(confOf(c) * 100)}%</span>
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;
    log(`  Root cause: ${labelOf(mainCause)} [${Math.round(confOf(mainCause) * 100)}%]`, 'highlight');
    setStatus('Diagnosis complete', 'text-green-400');
    log(`<span class="prompt">&check;</span> Diagnosis done`, 'highlight');
    return data;
  } catch (e) {
    log(`<span class="err">&#10005; Error: ${e.message}</span>`, 'err');
    setStatus('Error', 'text-red-400');
  } finally {
    setBusy(false);
  }
}

async function runAll() {
  log('<span class="highlight">&#9889; Running full pipeline: Perceive → Predict → Diagnose</span>', 'highlight');
  await runDetect();
  await delay(500);
  await runPredict();
  await delay(500);
  await runDiagnose();
  log('<span class="prompt">&check; Full pipeline complete</span>', 'highlight');
}

$('#btn-detect').addEventListener('click', runDetect);
$('#btn-predict').addEventListener('click', runPredict);
$('#btn-diagnose').addEventListener('click', runDiagnose);
$('#btn-run-all').addEventListener('click', runAll);
$('#dataset-select').addEventListener('change', () => {
  const found = (window.__DATASETS__ || []).find(d => d.id === currentDataset());
  if (found) renderDatasetBanner(found);
  log(`<span class="highlight">&#128193; dataset → ${currentDataset()}</span>`, 'highlight');
});

drawSpectrogram([{type:'bg', freq_hz: 500, confidence: 0.0}]);
drawPrediction({values: Array.from({length: 72}, (_, i) => 0.96 - i * 0.0005 + (Math.random() - 0.5) * 0.003), trend: '-0.05%/day'}, null);
loadDatasetInfo();
</script>
</body>
