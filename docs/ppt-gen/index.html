<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPT Gen — Live Slide Builder</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .card { background: rgba(30,30,50,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(100,100,150,0.2); border-radius: 12px; }
  .gradient-text { background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #lang-toggle { cursor: pointer; } #lang-toggle:hover { background: rgba(100,150,255,0.2); }
  input, textarea, select { background: #0b1220; color: #e2e8f0; border: 1px solid rgba(100,100,150,0.3); border-radius: 6px; padding: 8px 10px; font-size: 13px; width: 100%; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: #60a5fa; }
  label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 4px; }
  .btn { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; padding: 8px 14px; border-radius: 8px; font-weight: 500; font-size: 13px; }
  .btn-sec { background: rgba(100,100,150,0.2); border: 1px solid rgba(100,100,150,0.3); padding: 8px 14px; border-radius: 8px; color: #e2e8f0; font-size: 13px; }
  .theme-swatch { width: 36px; height: 36px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
  .theme-swatch.active { border-color: #fff; transform: scale(1.1); }
  .slide {
    aspect-ratio: 16/9; width: 100%; border-radius: 12px; padding: 48px;
    display: flex; flex-direction: column; position: relative; overflow: hidden;
    font-family: 'Inter','PingFang SC',sans-serif;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .slide * { line-height: 1.3; }
</style>
</head>
<body class="min-h-screen">

<div class="fixed top-4 right-4 z-50">
  <button id="lang-toggle" class="px-3 py-1.5 rounded-full bg-gray-800/80 backdrop-blur border border-gray-700 text-sm font-medium text-gray-300 flex items-center gap-2">
    <span>🌐</span><span id="lang-label">中文</span>
  </button>
</div>

<div class="max-w-7xl mx-auto px-6 py-8">
  <a href="/" class="text-sm text-blue-400 hover:text-blue-300" data-en="← Back to home" data-zh="← 返回首页">← Back to home</a>
  <h1 class="text-3xl font-bold mt-3 gradient-text" data-en="PPT Live Builder" data-zh="PPT 实时生成器">PPT Live Builder</h1>
  <p class="text-gray-400 mt-1" data-en="Edit the form → preview updates in real time → export PNG." data-zh="编辑左侧 → 右侧实时预览 → 一键导出 PNG。">Edit the form → preview updates in real time → export PNG.</p>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-5 mt-6">
    <div class="card p-5 space-y-3 lg:col-span-1">
      <div>
        <label data-en="Template" data-zh="模板">Template</label>
        <select id="tmpl">
          <option value="cover">Cover</option>
          <option value="agenda">Agenda</option>
          <option value="data">Data</option>
          <option value="split">Split (text + chart)</option>
          <option value="summary">Summary</option>
        </select>
      </div>
      <div><label data-en="Title" data-zh="标题">Title</label><input id="title" value="AI Agents in Enterprise"></div>
      <div><label data-en="Subtitle" data-zh="副标题">Subtitle</label><input id="subtitle" value="2026 Outlook"></div>
      <div><label data-en="Company" data-zh="公司">Company</label><input id="company" value="OpenClaw"></div>
      <div><label data-en="Date" data-zh="日期">Date</label><input id="date" value="April 2026"></div>
      <div><label data-en="Content" data-zh="内容">Content</label><textarea id="content" rows="6">Market size & adoption
Top enterprise use cases
Deployment patterns
Governance & safety
Roadmap & next steps</textarea></div>

      <div>
        <label data-en="Theme" data-zh="主题">Theme</label>
        <div class="flex gap-2">
          <div class="theme-swatch active" data-theme="0" style="background: linear-gradient(135deg,#1e3a8a,#f97316)"></div>
          <div class="theme-swatch" data-theme="1" style="background: linear-gradient(135deg,#7f1d1d,#fbbf24)"></div>
          <div class="theme-swatch" data-theme="2" style="background: linear-gradient(135deg,#064e3b,#64748b)"></div>
          <div class="theme-swatch" data-theme="3" style="background: linear-gradient(135deg,#581c87,#ec4899)"></div>
        </div>
      </div>
      <div>
        <label data-en="Custom accent" data-zh="自定义色">Custom accent</label>
        <input type="color" id="custom" value="#f97316" style="height: 40px; padding: 2px;">
      </div>

      <div class="flex gap-2 pt-2 flex-wrap">
        <button id="add" class="btn" data-en="Add Slide" data-zh="添加一页">Add Slide</button>
        <button id="prev" class="btn-sec">◀ Prev</button>
        <button id="next" class="btn-sec">Next ▶</button>
        <button id="export" class="btn" data-en="Export PNG" data-zh="导出 PNG">Export PNG</button>
        <button id="del" class="btn-sec" data-en="Delete" data-zh="删除">Delete</button>
      </div>
      <div class="text-xs text-gray-500 pt-2" id="slide-nav"></div>
    </div>

    <div class="lg:col-span-2">
      <div id="preview-wrap"><div id="slide" class="slide"></div></div>
    </div>
  </div>
</div>

<script>
const THEMES = [
  { bg:'linear-gradient(135deg,#0b1e4f,#1e3a8a)', accent:'#f97316', text:'#f8fafc', sub:'#cbd5e1', chart:'#fb923c' },
  { bg:'linear-gradient(135deg,#450a0a,#7f1d1d)', accent:'#fbbf24', text:'#fef3c7', sub:'#fde68a', chart:'#fbbf24' },
  { bg:'linear-gradient(135deg,#022c22,#064e3b)', accent:'#a7f3d0', text:'#f0fdf4', sub:'#cbd5e1', chart:'#34d399' },
  { bg:'linear-gradient(135deg,#3b0764,#581c87)', accent:'#f472b6', text:'#fdf4ff', sub:'#e9d5ff', chart:'#ec4899' }
];
const $ = id => document.getElementById(id);
const STORAGE = 'ppt-gen-state';

let state = JSON.parse(localStorage.getItem(STORAGE) || 'null') || {
  slides: [defaultSlide()], current: 0
};

function defaultSlide() {
  return { tmpl:'cover', title:'AI Agents in Enterprise', subtitle:'2026 Outlook', company:'OpenClaw', date:'April 2026',
    content:'Market size & adoption\nTop enterprise use cases\nDeployment patterns\nGovernance & safety\nRoadmap & next steps',
    theme: 0, custom: '#f97316' };
}
function save() { localStorage.setItem(STORAGE, JSON.stringify(state)); }

function currentTheme() {
  const s = state.slides[state.current];
  const t = { ...THEMES[s.theme] };
  if (s.custom) t.accent = s.custom;
  return t;
}

function renderSlide() {
  const s = state.slides[state.current];
  const t = currentTheme();
  const el = $('slide');
  el.style.background = t.bg;
  el.style.color = t.text;
  let html = '';
  if (s.tmpl === 'cover') {
    html = `
      <div class="flex-1 flex flex-col justify-center">
        <div style="font-size: 48px; font-weight: 800; letter-spacing: -0.02em;">${esc(s.title)}</div>
        <div style="font-size: 22px; color: ${t.sub}; margin-top: 12px;">${esc(s.subtitle)}</div>
        <div style="width: 72px; height: 4px; background: ${t.accent}; margin-top: 24px; border-radius: 2px;"></div>
      </div>
      <div style="display:flex; justify-content: space-between; font-size: 13px; color: ${t.sub};">
        <span>${esc(s.company)}</span><span>${esc(s.date)}</span>
      </div>`;
  } else if (s.tmpl === 'agenda') {
    const items = s.content.split('\n').filter(Boolean);
    html = `
      <div style="font-size: 32px; font-weight: 700;">${esc(s.title)}</div>
      <div style="width: 60px; height: 3px; background: ${t.accent}; margin: 10px 0 28px;"></div>
      <ol style="font-size: 20px; line-height: 2; color: ${t.text};">
        ${items.map((it,i) => `<li style="list-style:none; display:flex; gap:16px; align-items:baseline;"><span style="color:${t.accent}; font-weight:700; min-width:32px;">${String(i+1).padStart(2,'0')}</span><span>${esc(it)}</span></li>`).join('')}
      </ol>`;
  } else if (s.tmpl === 'data') {
    const first = s.content.split('\n')[0] || '78%';
    const rest = s.content.split('\n').slice(1).join(' ') || 'of enterprises plan AI agent deployments in 2026.';
    html = `
      <div style="font-size: 22px; color: ${t.sub};">${esc(s.title)}</div>
      <div style="flex: 1; display: flex; gap: 40px; align-items: center;">
        <div style="font-size: 120px; font-weight: 800; color: ${t.accent}; letter-spacing: -0.04em;">${esc(first)}</div>
        <div style="font-size: 22px; max-width: 380px; line-height: 1.5;">${esc(rest)}</div>
      </div>
      <div style="font-size: 11px; color: ${t.sub};">Source: ${esc(s.company)} Research, ${esc(s.date)}</div>`;
  } else if (s.tmpl === 'split') {
    const bullets = s.content.split('\n').filter(Boolean);
    const bars = [65, 48, 82, 34, 71];
    html = `
      <div style="font-size: 28px; font-weight: 700; margin-bottom: 20px;">${esc(s.title)}</div>
      <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center;">
        <div>
          <ul style="font-size: 15px; line-height: 1.9;">
            ${bullets.slice(0,5).map(b => `<li style="list-style:none; padding-left:20px; position:relative;"><span style="position:absolute; left:0; color:${t.accent};">▸</span>${esc(b)}</li>`).join('')}
          </ul>
        </div>
        <svg viewBox="0 0 300 200" style="width:100%;">
          ${bars.map((b,i) => `<rect x="${20+i*55}" y="${200-b*2}" width="36" height="${b*2}" fill="${t.chart}" rx="3"/><text x="${38+i*55}" y="195" text-anchor="middle" font-size="10" fill="${t.sub}">Q${i+1}</text>`).join('')}
        </svg>
      </div>`;
  } else if (s.tmpl === 'summary') {
    const items = s.content.split('\n').filter(Boolean).slice(0,3);
    while (items.length < 3) items.push('Key takeaway');
    html = `
      <div style="font-size: 28px; font-weight: 700; margin-bottom: 28px;">${esc(s.title)}</div>
      <div style="flex:1; display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
        ${items.map((it,i) => `
          <div style="background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 20px;">
            <div style="font-size: 32px; font-weight: 800; color: ${t.accent};">${String(i+1).padStart(2,'0')}</div>
            <div style="font-size: 14px; margin-top: 10px; line-height: 1.5;">${esc(it)}</div>
          </div>`).join('')}
      </div>
      <div style="font-size:11px; color:${t.sub}; text-align:right; margin-top:16px;">${esc(s.company)} · ${esc(s.date)}</div>`;
  }
  el.innerHTML = html;
}
function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function loadForm() {
  const s = state.slides[state.current];
  $('tmpl').value = s.tmpl;
  $('title').value = s.title;
  $('subtitle').value = s.subtitle;
  $('company').value = s.company;
  $('date').value = s.date;
  $('content').value = s.content;
  $('custom').value = s.custom;
  document.querySelectorAll('.theme-swatch').forEach(sw => sw.classList.toggle('active', +sw.dataset.theme === s.theme));
  $('slide-nav').textContent = `Slide ${state.current+1} / ${state.slides.length}`;
}

['tmpl','title','subtitle','company','date','content','custom'].forEach(id => {
  $(id).addEventListener('input', () => {
    state.slides[state.current][id] = $(id).value;
    save(); renderSlide();
  });
});
document.querySelectorAll('.theme-swatch').forEach(sw => {
  sw.addEventListener('click', () => {
    state.slides[state.current].theme = +sw.dataset.theme;
    document.querySelectorAll('.theme-swatch').forEach(x => x.classList.remove('active'));
    sw.classList.add('active');
    save(); renderSlide();
  });
});

$('add').addEventListener('click', () => {
  state.slides.push(defaultSlide());
  state.current = state.slides.length - 1;
  save(); loadForm(); renderSlide();
});
$('prev').addEventListener('click', () => {
  if (state.current > 0) { state.current--; save(); loadForm(); renderSlide(); }
});
$('next').addEventListener('click', () => {
  if (state.current < state.slides.length - 1) { state.current++; save(); loadForm(); renderSlide(); }
});
$('del').addEventListener('click', () => {
  if (state.slides.length <= 1) return;
  state.slides.splice(state.current, 1);
  state.current = Math.max(0, state.current - 1);
  save(); loadForm(); renderSlide();
});
$('export').addEventListener('click', async () => {
  const el = $('slide');
  const canvas = await html2canvas(el, { scale: 2, backgroundColor: null });
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `slide-${state.current + 1}.png`;
  a.click();
});

loadForm(); renderSlide();

(function() {
  const STORAGE_KEY = 'sa-toolkit-lang';
  let lang = localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(STORAGE_KEY, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`); if (t) el.textContent = t;
    });
    document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(el => {
      el.placeholder = el.getAttribute(`data-${l}-placeholder`);
    });
    const lab = document.getElementById('lang-label');
    if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => apply(lang === 'en' ? 'zh' : 'en'));
  apply(lang);
})();
</script>
</body>
</html>
