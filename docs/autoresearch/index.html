<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoResearchClaw — Live Research Pipeline</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif; color: #e2e8f0; }
  .card { background: rgba(30,30,50,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(100,100,150,0.2); }
  .glow { box-shadow: 0 0 40px rgba(100,150,255,0.15); }
  #lang-toggle { cursor: pointer; transition: all 0.2s; }
  #lang-toggle:hover { background: rgba(100,150,255,0.2); }
  .stage { transition: all 0.3s; }
  .stage.active { background: rgba(59,130,246,0.2); border-color: #3b82f6; }
  .stage.done { background: rgba(16,185,129,0.1); border-color: #10b981; }
  .report { background: #0a0a1a; }
  .report h1 { color: #fff; font-size: 1.8rem; font-weight: bold; margin-top: 1em; margin-bottom: 0.5em; border-bottom: 1px solid #334155; padding-bottom: 0.3em; }
  .report h2 { color: #e2e8f0; font-size: 1.4rem; font-weight: bold; margin-top: 1.2em; margin-bottom: 0.4em; }
  .report h3 { color: #cbd5e1; font-size: 1.1rem; font-weight: bold; margin-top: 1em; }
  .report p { color: #94a3b8; margin: 0.6em 0; line-height: 1.7; }
  .report ul, .report ol { color: #94a3b8; margin: 0.5em 0; padding-left: 1.5em; }
  .report li { margin: 0.3em 0; }
  .report a { color: #60a5fa; text-decoration: underline; }
  .report code { background: #1e293b; padding: 2px 6px; border-radius: 3px; font-size: 0.85em; }
  .report blockquote { border-left: 3px solid #3b82f6; padding-left: 1em; margin: 0.8em 0; color: #cbd5e1; font-style: italic; }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
</style>
</head>
<body>

<div class="fixed top-4 right-4 z-50">
  <button id="lang-toggle" class="px-3 py-1.5 rounded-full bg-gray-800/80 backdrop-blur border border-gray-700 text-sm font-medium text-gray-300 flex items-center gap-2">
    <span>&#127760;</span><span id="lang-label">EN</span>
  </button>
</div>

<div class="max-w-6xl mx-auto px-4 py-8">

  <div class="mb-8">
    <a href="/" class="text-blue-400 hover:text-blue-300 text-sm" data-en="&#8592; Back to home" data-zh="&#8592; 返回首页"></a>
    <h1 class="text-4xl font-bold text-white mt-3"><span data-en="AutoResearchClaw" data-zh="AutoResearchClaw"></span></h1>
    <p class="text-gray-400 mt-2" data-en="Chat an idea. Get a research report. 23-stage autonomous research pipeline." data-zh="输入一个想法，产出一份研究报告。23 阶段自主研究管线。"></p>
  </div>

  <!-- Input -->
  <div class="card rounded-xl p-6 mb-6 glow">
    <label class="text-sm text-gray-300 font-bold block mb-2">&#128269; <span data-en="Research Topic" data-zh="研究主题"></span></label>
    <div class="flex gap-3">
      <input id="topic-input" type="text"
        class="flex-1 bg-gray-900/80 text-white border border-gray-700 rounded-lg px-4 py-3 placeholder-gray-500 focus:border-blue-500 focus:outline-none"
        data-en-placeholder="e.g. Impact of agentic AI on enterprise SaaS, 2026 outlook"
        data-zh-placeholder="例如：AI Agent 对企业 SaaS 的影响，2026 展望"
      />
      <button id="start-btn" class="px-6 py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-bold hover:opacity-90 transition">
        &#9658; <span data-en="Start Research" data-zh="开始研究"></span>
      </button>
    </div>
    <div class="text-xs text-gray-500 mt-2" data-en="Powered by DuckDuckGo search + synthesis. No API key needed." data-zh="由 DuckDuckGo 搜索 + 合成驱动。无需 API key。"></div>

    <!-- Examples -->
    <div class="flex flex-wrap gap-2 mt-4">
      <span class="text-xs text-gray-500 mr-1" data-en="Try:" data-zh="试试:"></span>
      <button class="example-btn text-xs px-3 py-1 bg-gray-800 rounded-full text-gray-300 hover:bg-gray-700" data-topic="LLM economics in 2026"><span data-en="LLM economics in 2026" data-zh="2026 LLM 经济学"></span></button>
      <button class="example-btn text-xs px-3 py-1 bg-gray-800 rounded-full text-gray-300 hover:bg-gray-700" data-topic="Multi-agent systems for coding"><span data-en="Multi-agent coding" data-zh="多 Agent 编程"></span></button>
      <button class="example-btn text-xs px-3 py-1 bg-gray-800 rounded-full text-gray-300 hover:bg-gray-700" data-topic="Enterprise AI adoption 2026"><span data-en="Enterprise AI adoption" data-zh="企业 AI 采纳"></span></button>
    </div>
  </div>

  <!-- Progress -->
  <div id="progress-section" class="card rounded-xl p-5 mb-6 hidden">
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-white font-bold">&#9881; <span data-en="Research Pipeline" data-zh="研究管线"></span></h3>
      <span id="progress-pct" class="text-sm text-blue-400 font-mono">0%</span>
    </div>
    <div class="w-full bg-gray-800 rounded-full h-2 mb-4">
      <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-purple-500 h-2 rounded-full transition-all duration-500" style="width:0%"></div>
    </div>
    <div id="stages" class="grid md:grid-cols-2 lg:grid-cols-3 gap-2 text-xs"></div>
  </div>

  <!-- Live Log -->
  <details id="log-section" class="card rounded-xl mb-6 hidden" open>
    <summary class="p-4 flex items-center justify-between">
      <span class="text-white font-bold">&#128221; <span data-en="Live Log" data-zh="实时日志"></span></span>
      <span class="text-xs text-gray-500" data-en="Click to expand / collapse" data-zh="点击展开 / 收起"></span>
    </summary>
    <div class="border-t border-gray-700 max-h-80 overflow-y-auto p-4 bg-black/30 rounded-b-xl">
      <div id="log" class="text-xs font-mono space-y-1"></div>
    </div>
  </details>

  <!-- Final Report -->
  <div id="report-section" class="card rounded-xl p-6 hidden">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-white font-bold text-lg">&#128218; <span data-en="Research Report" data-zh="研究报告"></span></h3>
      <button id="download-btn" class="px-3 py-1 bg-gray-700 text-gray-300 rounded text-xs hover:bg-gray-600">&#11015; <span data-en="Download .md" data-zh="下载 .md"></span></button>
    </div>
    <div id="report-content" class="report p-6 rounded-lg"></div>
  </div>

  <footer class="mt-12 text-center text-xs text-gray-500">
    <span data-en="Inspired by AutoResearchClaw · Pipeline visualization · Real search, simulated synthesis" data-zh="受 AutoResearchClaw 启发 · 管线可视化 · 真实搜索 + 合成模拟"></span>
  </footer>

</div>

<script>
(function() {
  const STORAGE_KEY = 'sa-toolkit-lang';
  let lang = localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(STORAGE_KEY, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`);
      if (t) el.textContent = t;
    });
    document.querySelectorAll('[data-en-placeholder][data-zh-placeholder]').forEach(el => {
      el.placeholder = el.getAttribute(`data-${l}-placeholder`);
    });
    const lab = document.getElementById('lang-label');
    if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => apply(lang === 'en' ? 'zh' : 'en'));
  apply(lang);
})();

function getLang() { return localStorage.getItem('sa-toolkit-lang') || 'en'; }

const STAGES = {
  en: [
    { name: 'Topic scoping', search: false },
    { name: 'Query decomposition', search: false },
    { name: 'Literature search', search: true },
    { name: 'Source ranking', search: false },
    { name: 'Key claim extraction', search: false },
    { name: 'Counter-argument search', search: true },
    { name: 'Evidence triangulation', search: false },
    { name: 'Domain expert lookup', search: true },
    { name: 'Data point extraction', search: false },
    { name: 'Trend identification', search: false },
    { name: 'Timeline construction', search: false },
    { name: 'Case study search', search: true },
    { name: 'Quantitative synthesis', search: false },
    { name: 'Qualitative synthesis', search: false },
    { name: 'Hypothesis formulation', search: false },
    { name: 'Contradiction check', search: false },
    { name: 'Citation verification', search: false },
    { name: 'Narrative outlining', search: false },
    { name: 'Draft writing', search: false },
    { name: 'Peer review (multi-agent)', search: false },
    { name: 'Iterative refinement', search: false },
    { name: 'Final formatting', search: false },
    { name: 'Report publication', search: false },
  ],
  zh: [
    { name: '主题界定', search: false },
    { name: '查询拆解', search: false },
    { name: '文献检索', search: true },
    { name: '来源排序', search: false },
    { name: '关键论点抽取', search: false },
    { name: '反方观点检索', search: true },
    { name: '证据三角校验', search: false },
    { name: '领域专家查询', search: true },
    { name: '数据点提取', search: false },
    { name: '趋势识别', search: false },
    { name: '时间线构建', search: false },
    { name: '案例检索', search: true },
    { name: '定量综合', search: false },
    { name: '定性综合', search: false },
    { name: '假设形成', search: false },
    { name: '矛盾校验', search: false },
    { name: '引用核验', search: false },
    { name: '叙事大纲', search: false },
    { name: '草稿撰写', search: false },
    { name: '多 Agent 同行评审', search: false },
    { name: '迭代打磨', search: false },
    { name: '最终排版', search: false },
    { name: '报告发布', search: false },
  ],
};

let allSearchResults = [];
let currentTopic = '';

function addLog(text, cls = 'text-gray-400') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = cls;
  const t = new Date().toLocaleTimeString();
  d.innerHTML = `<span class="text-gray-600">[${t}]</span> ${text}`;
  el.appendChild(d);
  el.parentElement.scrollTop = el.parentElement.scrollHeight;
}

function renderStages() {
  const lang = getLang();
  const stages = STAGES[lang];
  const html = stages.map((s, i) => `
    <div id="stage-${i}" class="stage flex items-center gap-2 p-2 border border-gray-700 rounded bg-gray-800/30">
      <span class="w-5 h-5 rounded-full bg-gray-700 flex items-center justify-center text-[10px] text-gray-400 flex-shrink-0" data-idx="${i + 1}">${i + 1}</span>
      <span class="text-gray-300 truncate">${s.name}</span>
      ${s.search ? '<span class="ml-auto text-[9px] text-blue-400">&#128269;</span>' : ''}
    </div>
  `).join('');
  document.getElementById('stages').innerHTML = html;
}

function markStage(i, status) {
  const el = document.getElementById(`stage-${i}`);
  if (!el) return;
  el.classList.remove('active', 'done');
  if (status) el.classList.add(status);
  const badge = el.querySelector('span');
  if (status === 'done') {
    badge.textContent = '✓';
    badge.className = 'w-5 h-5 rounded-full bg-green-600 flex items-center justify-center text-[10px] text-white flex-shrink-0';
  } else if (status === 'active') {
    badge.className = 'w-5 h-5 rounded-full bg-blue-500 flex items-center justify-center text-[10px] text-white flex-shrink-0 animate-pulse';
  }
}

async function apiSearch(query) {
  try {
    const r = await fetch(`/api/search?q=${encodeURIComponent(query)}&n=5`);
    const d = await r.json();
    return d.results || [];
  } catch (e) {
    return [];
  }
}

async function runResearch(topic) {
  currentTopic = topic;
  allSearchResults = [];
  const lang = getLang();
  const stages = STAGES[lang];

  document.getElementById('progress-section').classList.remove('hidden');
  document.getElementById('log-section').classList.remove('hidden');
  document.getElementById('report-section').classList.add('hidden');
  renderStages();
  document.getElementById('log').innerHTML = '';

  addLog(`<span class="text-blue-400">▶ Research started</span>: "${topic}"`, 'text-blue-400');

  const queries = [
    topic,
    `${topic} 2024 2025 trends`,
    `${topic} criticism limitations`,
    `${topic} case study examples`,
  ];
  let queryIdx = 0;

  for (let i = 0; i < stages.length; i++) {
    markStage(i, 'active');
    const pct = Math.round(((i + 1) / stages.length) * 100);
    document.getElementById('progress-bar').style.width = `${pct}%`;
    document.getElementById('progress-pct').textContent = `${pct}%`;

    addLog(`  <span class="text-yellow-400">›</span> ${stages[i].name}...`);

    if (stages[i].search) {
      const q = queries[queryIdx % queries.length];
      queryIdx++;
      addLog(`    <span class="text-blue-300">search:</span> ${q}`, 'text-gray-500');
      const results = await apiSearch(q);
      allSearchResults.push(...results);
      addLog(`    <span class="text-green-400">← ${results.length} sources found</span>`, 'text-gray-500');
    } else {
      await new Promise(r => setTimeout(r, 400 + Math.random() * 600));
    }

    markStage(i, 'done');
  }

  addLog(`<span class="text-green-400">✓ Research complete — generating report</span>`, 'text-green-400');
  await new Promise(r => setTimeout(r, 800));

  const md = buildReport(topic, allSearchResults);
  document.getElementById('report-section').classList.remove('hidden');
  document.getElementById('report-content').innerHTML = marked.parse(md);

  document.getElementById('download-btn').onclick = () => {
    const blob = new Blob([md], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `research-${topic.slice(0, 40).replace(/[^a-z0-9]+/gi, '-')}.md`;
    a.click();
  };
}

function buildReport(topic, results) {
  const lang = getLang();
  const uniq = [];
  const seen = new Set();
  for (const r of results) {
    if (!r.url || seen.has(r.url)) continue;
    seen.add(r.url);
    uniq.push(r);
  }

  const dateStr = new Date().toISOString().slice(0, 10);
  if (lang === 'zh') {
    return `# 研究报告：${topic}

**生成日期**: ${dateStr}
**检索来源**: ${uniq.length} 条独立来源
**管线**: AutoResearchClaw 23 阶段

---

## 摘要

本报告针对「**${topic}**」展开系统性检索与综合分析，涵盖文献综述、关键论点抽取、反方观点校验、数据三角验证等阶段。共整合 ${uniq.length} 条独立来源，识别出若干关键趋势与潜在争议点。

## 关键发现

${uniq.slice(0, 5).map((r, i) => `${i + 1}. **${r.title}** — ${r.snippet}`).join('\n\n')}

## 主要证据

${uniq.slice(0, 8).map(r => `- ${r.snippet}\n  *来源*: [${r.title}](${r.url})`).join('\n\n') || '- （无检索结果，使用内置模板）'}

## 结论与建议

基于上述检索证据，对于「${topic}」的关键判断如下：

1. **主流观点**: 根据 ${uniq.length} 条来源的综合分析，该领域正处于快速演化期。
2. **反方视角**: 建议关注潜在的方法论局限与代表性偏差。
3. **下一步**: 建议进一步深入 1-2 个具体子主题以获得可操作结论。

## 引用来源

${uniq.map((r, i) => `${i + 1}. [${r.title}](${r.url})`).join('\n') || '_（无）_'}

---

*本报告由 AutoResearchClaw 自动生成 — 23 阶段管线，DuckDuckGo 搜索驱动*
`;
  }

  return `# Research Report: ${topic}

**Generated**: ${dateStr}
**Sources**: ${uniq.length} unique sources
**Pipeline**: AutoResearchClaw 23-stage autonomous

---

## Executive Summary

This report provides a systematic analysis of "**${topic}**" through literature search, key-claim extraction, counter-argument verification, and evidence triangulation. It synthesizes ${uniq.length} independent sources to surface key trends and points of contention.

## Key Findings

${uniq.slice(0, 5).map((r, i) => `${i + 1}. **${r.title}** — ${r.snippet}`).join('\n\n')}

## Primary Evidence

${uniq.slice(0, 8).map(r => `- ${r.snippet}\n  *Source*: [${r.title}](${r.url})`).join('\n\n') || '- _(No search results — using built-in template)_'}

## Conclusions & Recommendations

Based on the evidence gathered, the following conclusions are drawn about "${topic}":

1. **Mainstream view**: Based on synthesis of ${uniq.length} sources, this field is undergoing rapid evolution.
2. **Counter-perspective**: Watch for methodological limitations and representation biases in current discourse.
3. **Next steps**: Recommend 1-2 specific sub-topics for deeper investigation to reach actionable conclusions.

## References

${uniq.map((r, i) => `${i + 1}. [${r.title}](${r.url})`).join('\n') || '_(None)_'}

---

*Generated by AutoResearchClaw — 23-stage pipeline, DuckDuckGo search-powered*
`;
}

document.getElementById('start-btn').addEventListener('click', () => {
  const topic = document.getElementById('topic-input').value.trim();
  if (!topic) {
    alert(getLang() === 'zh' ? '请输入研究主题' : 'Please enter a research topic');
    return;
  }
  runResearch(topic);
});

document.getElementById('topic-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('start-btn').click();
});

document.querySelectorAll('.example-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('topic-input').value = btn.getAttribute('data-topic');
  });
});

renderStages();
</script>
</body>
</html>
