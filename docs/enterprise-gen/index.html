<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enterprise Demo Package Generator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'PingFang SC', sans-serif; margin: 0; }
  .card { background: rgba(30,30,50,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(100,100,150,0.2); border-radius: 12px; }
  .lang-toggle { position: fixed; top: 16px; right: 16px; z-index: 50; padding: 6px 14px; border-radius: 999px; background: rgba(30,30,50,0.8); border: 1px solid rgba(100,100,150,0.3); color: #e2e8f0; font-size: 13px; cursor: pointer; }
  input.field, select.field, textarea.field { width: 100%; padding: 10px 12px; border-radius: 8px; background: rgba(15,23,42,0.7); color: #e2e8f0; border: 1px solid rgba(100,100,150,0.3); font-size: 14px; outline: none; }
  input.field:focus, select.field:focus { border-color: #60a5fa; }
  .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; background: linear-gradient(135deg, #3b82f6, #6366f1); color: white; border: none; cursor: pointer; }
  .btn:disabled { opacity: 0.4; }
  .btn-ghost { background: rgba(30,30,50,0.6); border: 1px solid rgba(100,100,150,0.3); color: #e2e8f0; }
  .check-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 999px; background: rgba(30,30,50,0.6); border: 1px solid rgba(100,100,150,0.3); font-size: 13px; cursor: pointer; margin: 4px; user-select: none; }
  .check-chip.active { background: rgba(59,130,246,0.2); border-color: #60a5fa; }
  .tab-btn { padding: 8px 14px; border-radius: 8px 8px 0 0; font-size: 13px; background: transparent; color: #94a3b8; border: none; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: #e2e8f0; border-bottom-color: #60a5fa; }
  .md-content { font-size: 14px; line-height: 1.7; color: #e2e8f0; }
  .md-content h1 { font-size: 24px; font-weight: bold; margin: 20px 0 12px; color: #f1f5f9; }
  .md-content h2 { font-size: 18px; font-weight: bold; margin: 18px 0 10px; color: #f1f5f9; border-bottom: 1px solid rgba(100,100,150,0.2); padding-bottom: 6px; }
  .md-content h3 { font-size: 16px; font-weight: 600; margin: 14px 0 8px; color: #cbd5e1; }
  .md-content p, .md-content li { color: #cbd5e1; }
  .md-content table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 13px; }
  .md-content th, .md-content td { padding: 6px 10px; border-bottom: 1px solid rgba(100,100,150,0.2); text-align: left; }
  .md-content th { background: rgba(59,130,246,0.1); color: #cbd5e1; }
  .md-content code { background: rgba(0,0,0,0.3); padding: 2px 6px; border-radius: 4px; color: #fbbf24; font-size: 12px; }
  .spinner { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #3b82f6; border-top-color: transparent; animation: spin 0.8s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<button id="lang-toggle" class="lang-toggle"><span id="lang-label">中文</span></button>

<div class="max-w-6xl mx-auto px-6 py-8">
  <a href="/" class="text-sm text-blue-400 hover:text-blue-300" data-en="← Back to home" data-zh="← 返回首页">← Back to home</a>
  <div class="mt-4 mb-6">
    <h1 class="text-3xl font-bold" data-en="Enterprise Demo Package Generator" data-zh="企业级演示方案生成器">Enterprise Demo Package Generator</h1>
    <p class="text-slate-400 mt-2" data-en="Answer a few questions. Get a full AI-adoption demo package with ranked scenarios, schedule, and runbook." data-zh="回答几个问题，获取一份包含评分、日程和执行手册的完整AI落地演示方案。"></p>
  </div>

  <div id="err-banner" class="hidden card p-3 mb-4" style="background: rgba(127,29,29,0.3); border-color: rgba(248,113,113,0.5); color: #fca5a5;"></div>

  <div id="step-form" class="card p-6">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
      <div>
        <label class="text-sm text-slate-400 mb-1 block" data-en="Company name" data-zh="企业名称"></label>
        <input id="f-company" class="field" value="Alibaba" />
      </div>
      <div>
        <label class="text-sm text-slate-400 mb-1 block" data-en="Industry" data-zh="行业"></label>
        <select id="f-industry" class="field">
          <option value="banking">Banking</option>
          <option value="manufacturing">Manufacturing</option>
          <option value="aerospace">Aerospace</option>
          <option value="healthcare">Healthcare</option>
          <option value="retail">Retail</option>
          <option value="consulting">Consulting</option>
          <option value="logistics">Logistics</option>
          <option value="realestate">Real Estate</option>
          <option value="energy">Energy</option>
          <option value="tech" selected>Tech</option>
        </select>
      </div>
      <div>
        <label class="text-sm text-slate-400 mb-1 block" data-en="Employee count" data-zh="员工规模"></label>
        <div id="f-size" class="flex flex-wrap gap-2">
          <label class="check-chip"><input type="radio" name="size" value="<500">&lt;500</label>
          <label class="check-chip active"><input type="radio" name="size" value="500-5000" checked>500-5000</label>
          <label class="check-chip"><input type="radio" name="size" value="5000-50000">5000-50000</label>
          <label class="check-chip"><input type="radio" name="size" value=">50000">&gt;50000</label>
        </div>
      </div>
      <div>
        <label class="text-sm text-slate-400 mb-1 block" data-en="Target audience" data-zh="目标受众"></label>
        <select id="f-audience" class="field">
          <option value="executives">Executives</option>
          <option value="engineering">Engineering</option>
          <option value="business">Business users</option>
          <option value="allhands">All-hands</option>
        </select>
      </div>
    </div>

    <div class="mt-5">
      <label class="text-sm text-slate-400 mb-1 block" data-en="Pain points (pick any that apply)" data-zh="痛点（多选）"></label>
      <div id="f-pain" class="flex flex-wrap"></div>
    </div>

    <div class="mt-5">
      <label class="text-sm text-slate-400 mb-1 block">
        <span data-en="Presentation length:" data-zh="演示时长："></span>
        <span id="f-min-label" class="ml-2 text-blue-400 font-bold">90</span>
        <span data-en=" min" data-zh=" 分钟"></span>
      </label>
      <input id="f-min" type="range" min="30" max="180" value="90" step="15" class="w-full accent-blue-500" />
    </div>

    <div class="mt-6 flex gap-3">
      <button id="btn-generate" class="btn" data-en="✨ Generate Package" data-zh="✨ 生成方案"></button>
    </div>
  </div>

  <div id="step-progress" class="card p-6 mt-6 hidden">
    <div class="flex items-center gap-3"><div class="spinner"></div><span data-en="Generating via /api/enterprise?action=generate..." data-zh="正在调用 /api/enterprise?action=generate ..."></span></div>
  </div>

  <div id="step-result" class="hidden mt-6">
    <div class="card p-1">
      <div class="flex border-b border-slate-700">
        <button class="tab-btn active" data-tab="profile" data-en="Profile" data-zh="企业画像"></button>
        <button class="tab-btn" data-tab="matrix" data-en="Scoring Matrix" data-zh="评分矩阵"></button>
        <button class="tab-btn" data-tab="schedule" data-en="Schedule" data-zh="日程"></button>
        <button class="tab-btn" data-tab="runbook" data-en="RUNBOOK" data-zh="执行手册"></button>
        <button id="btn-download" class="ml-auto btn btn-ghost mr-1 my-1" data-en="⬇ Download" data-zh="⬇ 下载"></button>
        <button id="btn-restart" class="btn btn-ghost my-1 mr-1" data-en="↺ New" data-zh="↺ 新建"></button>
      </div>
      <div class="p-6">
        <div id="tab-profile" class="tab-panel md-content"></div>
        <div id="tab-matrix" class="tab-panel md-content hidden"></div>
        <div id="tab-schedule" class="tab-panel md-content hidden"></div>
        <div id="tab-runbook" class="tab-panel md-content hidden"></div>
      </div>
    </div>
  </div>
</div>

<script>
const PAIN_POINTS = [
  { k: 'doc',      en: 'Document processing',   zh: '文档处理' },
  { k: 'collab',   en: 'Collaboration speed',   zh: '协作效率' },
  { k: 'decision', en: 'Decision quality',      zh: '决策质量' },
  { k: 'km',       en: 'Knowledge management',  zh: '知识管理' },
  { k: 'market',   en: 'Market insights',       zh: '市场洞察' },
  { k: 'talent',   en: 'Talent shortage',       zh: '人才短缺' },
  { k: 'risk',     en: 'Risk detection',        zh: '风险识别' },
  { k: 'innov',    en: 'Innovation cycles',     zh: '创新周期' },
  { k: 'docburden',en: 'Documentation burden',  zh: '文档负担' },
  { k: 'legacy',   en: 'Legacy systems',        zh: '遗留系统' },
  { k: 'qc',       en: 'Quality control',       zh: '质量管控' },
  { k: 'comp',     en: 'Compliance',            zh: '合规' },
  { k: 'test',     en: 'Testing automation',    zh: '测试自动化' }
];

(function() {
  const box = document.getElementById('f-pain');
  PAIN_POINTS.forEach(p => {
    const l = document.createElement('label');
    l.className = 'check-chip';
    l.innerHTML = `<input type="checkbox" value="${p.k}"><span data-en="${p.en}" data-zh="${p.zh}">${p.en}</span>`;
    l.addEventListener('click', () => setTimeout(() => l.classList.toggle('active', l.querySelector('input').checked), 10));
    box.appendChild(l);
  });
})();

document.querySelectorAll('#f-size .check-chip input').forEach(inp => {
  inp.addEventListener('change', () => {
    document.querySelectorAll('#f-size .check-chip').forEach(c => c.classList.remove('active'));
    inp.parentElement.classList.add('active');
  });
});
document.getElementById('f-min').addEventListener('input', e => {
  document.getElementById('f-min-label').textContent = e.target.value;
});

function showError(msg) {
  const b = document.getElementById('err-banner');
  b.textContent = msg; b.classList.remove('hidden');
}
function clearError() { document.getElementById('err-banner').classList.add('hidden'); }

async function generate() {
  clearError();
  const profile = {
    company: document.getElementById('f-company').value || 'Acme Corp',
    industry: document.getElementById('f-industry').value,
    size: document.querySelector('input[name=size]:checked').value,
    audience: document.getElementById('f-audience').value,
    minutes: +document.getElementById('f-min').value,
    pain_points: Array.from(document.querySelectorAll('#f-pain input:checked')).map(i => i.value),
  };
  document.getElementById('step-form').classList.add('hidden');
  document.getElementById('step-progress').classList.remove('hidden');
  document.getElementById('step-result').classList.add('hidden');
  try {
    const res = await fetch('/api/enterprise?action=generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ profile }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const pkg = await res.json();
    if (pkg.error) throw new Error(pkg.error);
    window.__pkg = pkg;
    document.getElementById('step-progress').classList.add('hidden');
    document.getElementById('step-result').classList.remove('hidden');
    renderTab('profile');
  } catch (e) {
    document.getElementById('step-progress').classList.add('hidden');
    document.getElementById('step-form').classList.remove('hidden');
    showError(`API error: ${e.message}. Ensure /api/enterprise?action=generate is deployed.`);
  }
}

function renderTab(name) {
  const pkg = window.__pkg;
  if (!pkg) return;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
  const el = document.getElementById('tab-' + name);
  el.classList.remove('hidden');
  el.innerHTML = marked.parse(pkg[name] || '');
}
document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => renderTab(b.dataset.tab)));
document.getElementById('btn-generate').addEventListener('click', generate);
document.getElementById('btn-restart').addEventListener('click', () => {
  document.getElementById('step-result').classList.add('hidden');
  document.getElementById('step-form').classList.remove('hidden');
});
document.getElementById('btn-download').addEventListener('click', () => {
  const p = window.__pkg; if (!p) return;
  const md = `${p.profile}\n\n---\n\n${p.matrix}\n\n---\n\n${p.schedule}\n\n---\n\n${p.runbook}`;
  const blob = new Blob([md], { type: 'text/markdown' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `${(p.company || 'package').replace(/\s+/g,'_')}_demo_package.md`;
  a.click();
});

(function() {
  const STORAGE_KEY = 'sa-toolkit-lang';
  let lang = localStorage.getItem(STORAGE_KEY) || (navigator.language.startsWith('zh') ? 'zh' : 'en');
  function apply(l) {
    lang = l; localStorage.setItem(STORAGE_KEY, l);
    document.documentElement.lang = l === 'zh' ? 'zh-CN' : 'en';
    document.querySelectorAll('[data-en][data-zh]').forEach(el => {
      const t = el.getAttribute(`data-${l}`); if (t) el.textContent = t;
    });
    const lab = document.getElementById('lang-label');
    if (lab) lab.textContent = l === 'en' ? '中文' : 'EN';
  }
  document.getElementById('lang-toggle').addEventListener('click', () => apply(lang === 'en' ? 'zh' : 'en'));
  apply(lang);
})();
</script>
</body>
</html>
