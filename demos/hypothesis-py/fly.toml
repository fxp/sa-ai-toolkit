app = "sa-hypothesis"
primary_region = "nrt"

[build]
  dockerfile = "../../Dockerfile.demo"
  [build.args]
    DEMO_NAME = "hypothesis"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = "30s"
    grace_period = "15s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
